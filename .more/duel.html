    class ChickenMinion {
        constructor(x, y, owner, facingRight) {
            this.width = 500; // Gấp 3 lần player
            this.height = 80;
            this.x = x; this.y = y;
            this.owner = owner;
            this.facingRight = facingRight;
            this.maxHp = 50;
            this.hp = 50;
            this.damage = 70;
            this.speed = 2.5; // Tốc độ chậm
            this.active = true;
            this.isDead = false;
            
            this.state = 'seeking'; // Trạng thái: seeking (tìm địch), jumping (bay lên), falling (rơi xuống)
            this.vy = 0;
            this.vx = 0;
            this.moveTick = 0;
            this.targetDropX = 0;
        }

        update() {
            if (!this.active) return;
            if (this.frozenTimer && this.frozenTimer > 0) { this.frozenTimer--; return; }
            
            if (this.hp <= 0 && this.state === 'seeking') {
                this.active = false; // Chết trước khi kịp bay
                return;
            }

            let enemyPlayer = (this.owner === player1) ? player2 : player1;

            if (this.state === 'seeking') {
                // Rơi xuống đất và va chạm platform
                this.vy += gravity;
                this.y += this.vy;

                let onGround = false;
                if (this.y + this.height >= canvas.height - groundHeight) {
                    this.y = canvas.height - groundHeight - this.height;
                    this.vy = 0; onGround = true;
                }
                for (let plat of platforms) {
                    if (this.vy > 0 && this.y + this.height - this.vy <= plat.y && 
                        this.x + this.width > plat.x && this.x < plat.x + plat.w && this.y + this.height >= plat.y) {
                        this.y = plat.y - this.height;
                        this.vy = 0; onGround = true;
                    }
                }

                // Đi tìm địch
                let dx = enemyPlayer.x + enemyPlayer.width/2 - (this.x + this.width/2);
                
                // Nếu đến đủ gần địch thì bắt đầu bay lên
                if (Math.abs(dx) < 30) {
                    this.state = 'jumping';
                    this.vy = -20; // Lực nhảy cực mạnh bay lên trời
                    this.vx = 0;
                    this.targetDropX = enemyPlayer.x + enemyPlayer.width/2; // Khóa vị trí để rơi xuống
                } else {
                    if (dx > 0) { this.vx = this.speed; this.facingRight = true; }
                    else { this.vx = -this.speed; this.facingRight = false; }
                }

                this.x += this.vx;
                if (this.vx !== 0) this.moveTick++;
                
            } else if (this.state === 'jumping') {
                this.y += this.vy;
                if (this.y < -400) { // Đã bay khuất màn hình
                    this.state = 'falling';
                    this.vy = 5;
                    this.x = this.targetDropX - this.width/2; // Dịch chuyển ra đúng trên đầu địch
                }
            } else if (this.state === 'falling') {
                this.vy += gravity * 2.5; // Rơi nhanh xuống
                this.y += this.vy;

                // Xuyên qua mọi platform, kiểm tra trúng địch
                if (checkCollisionAdvanced(this, enemyPlayer)) {
                    enemyPlayer.takeDamage(this.damage);
                    projectiles.push(new ExplosionVisual(this.x + this.width/2, this.y + this.height)); // Vụ nổ
                    this.active = false; // Biến mất sau khi nổ
                }

                // Rơi ra khỏi map (xuống lòng đất)
                if (this.y > canvas.height + 200) {
                    this.active = false;
                }
            }
        }

        draw() {
            if (!this.active) return;
            ctx.save();
            
            let centerX = this.x + this.width/2;
            let centerY = this.y + this.height/2;
            ctx.translate(centerX, centerY);
            
            // Xoay hướng
            if (!this.facingRight) ctx.scale(-1, 1);

            // -- VẼ GÀ LỰC SĨ --
            // Thân tròn (màu trắng/vàng nhạt)
            ctx.fillStyle = '#FFFDE7';
            ctx.beginPath(); ctx.ellipse(0, 0, 20, 28, 0, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#FBC02D'; ctx.lineWidth = 2; ctx.stroke();

            // 6 múi (cơ bụng)
            ctx.strokeStyle = '#F57F17'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(0, 5); ctx.lineTo(0, 25); ctx.stroke(); // Rãnh giữa
            ctx.beginPath(); ctx.moveTo(-8, 10); ctx.lineTo(8, 10); ctx.stroke(); // Ngang 1
            ctx.beginPath(); ctx.moveTo(-9, 17); ctx.lineTo(9, 17); ctx.stroke(); // Ngang 2
            ctx.beginPath(); ctx.moveTo(-8, 24); ctx.lineTo(8, 24); ctx.stroke(); // Ngang 3

            // Đầu gà
            // Mào đỏ
            ctx.fillStyle = '#E53935';
            ctx.beginPath(); ctx.arc(-4, -28, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(4, -32, 7, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(12, -28, 5, 0, Math.PI*2); ctx.fill();

            // Mắt ngầu
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(8, -15, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = 'black';
            ctx.beginPath(); ctx.moveTo(4, -19); ctx.lineTo(12, -17); ctx.stroke(); // Lông mày nhíu lại

            // Mỏ cam
            ctx.fillStyle = '#FF9800';
            ctx.beginPath(); ctx.moveTo(16, -16); ctx.lineTo(26, -12); ctx.lineTo(16, -8); ctx.fill();

            // Cánh trái (Nâng tạ)
            ctx.fillStyle = '#FFFDE7';
            ctx.beginPath(); ctx.moveTo(-15, -5); ctx.lineTo(-30, -15); ctx.lineWidth = 6; ctx.stroke(); // Tay
            // Tạ (Dumbbell)
            ctx.fillStyle = '#757575'; ctx.fillRect(-40, -17, 20, 4); // Thanh tạ
            ctx.fillStyle = '#212121'; ctx.fillRect(-42, -22, 6, 14); // Cục tạ 1
            ctx.fillStyle = '#212121'; ctx.fillRect(-26, -22, 6, 14); // Cục tạ 2

            // Cánh phải (Flex cơ bắp)
            ctx.fillStyle = '#FFFDE7';
            ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(25, -5); ctx.lineTo(20, -15); ctx.lineWidth = 6; ctx.stroke(); // Cánh tay gập
            ctx.fillStyle = '#FBC02D'; ctx.beginPath(); ctx.arc(20, -15, 4, 0, Math.PI*2); ctx.fill(); // Nắm đấm

            // Chân (Màu cam, xoay tròn khi đi)
            ctx.translate(0, 28);
            if (this.vx !== 0 && this.state === 'seeking') {
                let spin = this.moveTick * 0.4;
                ctx.rotate(spin);
                ctx.strokeStyle = '#FF9800'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(-12, 0); ctx.lineTo(12, 0); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(0, 12); ctx.stroke();
            } else {
                // Đứng tư thế võ sĩ
                ctx.fillStyle = '#FF9800';
                ctx.fillRect(-10, 0, 4, 12);
                ctx.fillRect(6, 0, 4, 12);
                ctx.fillRect(-14, 12, 8, 4);
                ctx.fillRect(6, 12, 8, 4);
            }

            ctx.restore();

            // Vẽ thanh máu (ẩn đi khi đang bay trên trời)
            if (this.state === 'seeking') {
                ctx.fillStyle = 'black';
                ctx.fillRect(this.x, this.y - 10, this.width, 4);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(this.x, this.y - 10, this.width * (this.hp / this.maxHp), 4);
            }
        }
        
        takeDamage(amount) {
            // Chỉ nhận sát thương khi đang chạy dưới đất, bay lên là vô đối
            if (this.state === 'seeking') {
                this.hp -= amount;
            }
        }
    }
    class HollowPurpleProjectile {

        applyEffect(target) {

            if (!this.hitTargets.has(target)) {
                target.takeDamage(this.damage);
                this.hitTargets.add(target);
                
                // Hiệu ứng phụ: đẩy lùi nhẹ mục tiêu
                if (target.vx !== undefined) {
                    target.vx += this.vx > 0 ? 10 : -10;
                }
            }
        }
    }
    class BoomerangSawProjectile {
        constructor(owner) {
            this.owner = owner;
            this.width = 125; 
            this.height = 125;
            this.x = owner.x + owner.width/2 - this.width/2;
            this.y = owner.y + owner.height/2 - this.height/2;
            this.active = true;
            this.frozenTimer = 0;
            
            this.phase = 0; // 0: Xoay tại chỗ, 1: Bay lần 1, 2: Bay lần 2, 3: Thu về
            this.timer = 180; // 3 giây (60 frame/s)
            this.speed = 9; // Tốc độ bay chậm hơn đạn thường 3 điểm (đạn thường = 12)
            this.vx = 0; this.vy = 0;
            this.angle = 0;
            
            this.hitTargets = new Set();
            this.targetTickMap = new Map();
        }
        
        update() {
            if (this.frozenTimer > 0) { this.frozenTimer--; return; }
            this.angle += 0.3; // Hiệu ứng xoay
            
            // Giảm hồi chiêu tick dame mỗi 0.25s (15 frames)
            for (let [target, tick] of this.targetTickMap.entries()) {
                if (tick > 0) this.targetTickMap.set(target, tick - 1);
            }

            let opponent = (this.owner === player1) ? player2 : player1;

            if (this.phase === 0) {
                // Đứng yên tại người tung chiêu
                this.x = this.owner.x + this.owner.width/2 - this.width/2;
                this.y = this.owner.y + this.owner.height/2 - this.height/2;
                this.timer--;
                if (this.timer <= 0) {
                    this.phase = 1;
                    this.hitTargets.clear();
                    this.aimAt(opponent);
                }
            } else if (this.phase === 1) {
                this.x += this.vx; this.y += this.vy;
                if (this.isOutOfBounds()) {
                    this.phase = 2;
                    this.hitTargets.clear();
                    this.aimAt(opponent); // Aim lại vị trí thứ 2 của địch
                }
            } else if (this.phase === 2) {
                this.x += this.vx; this.y += this.vy;
                if (this.isOutOfBounds()) {
                    this.phase = 3;
                    this.hitTargets.clear();
                    this.aimAt(this.owner); // Aim lại vị trí hiện tại của chủ nhân
                }
            } else if (this.phase === 3) {
                this.x += this.vx; this.y += this.vy;
                
                // Nếu cưa chạm lại chủ nhân thì thu hồi
                let dx = Math.abs((this.x + this.width/2) - (this.owner.x + this.owner.width/2));
                let dy = Math.abs((this.y + this.height/2) - (this.owner.y + this.owner.height/2));
                if (dx < this.width/2 && dy < this.height/2) {
                    this.active = false;
                }
                
                // Hoặc bay ra khỏi map lần nữa cũng biến mất
                if (this.isOutOfBounds()) {
                    this.active = false; 
                }
            }
        }
        
        isOutOfBounds() {
            return (this.x < -200 || this.x > canvas.width + 200 || this.y < -200 || this.y > canvas.height + 200);
        }
        
        aimAt(target) {
            let targetX = target.x + target.width/2;
            let targetY = target.y + target.height/2;
            let startX = this.x + this.width/2;
            let startY = this.y + this.height/2;
            
            let angle = Math.atan2(targetY - startY, targetX - startX);
            this.vx = Math.cos(angle) * this.speed;
            this.vy = Math.sin(angle) * this.speed;
        }

        draw() {
            if (!this.active) return;
            ctx.save();
            ctx.translate(this.x + this.width/2, this.y + this.height/2);
            ctx.rotate(this.angle);
            
            // Vẽ đĩa cưa
            ctx.fillStyle = '#7a7a7a';
            ctx.beginPath();
            ctx.arc(0, 0, this.width/2 - 10, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = '#333333';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Vẽ răng cưa sắc nhọn
            ctx.fillStyle = '#eeeeee';
            for (let i = 0; i < 16; i++) {
                ctx.rotate((Math.PI * 2) / 16);
                ctx.beginPath();
                ctx.moveTo(this.width/2 - 15, -10);
                ctx.lineTo(this.width/2, 0);
                ctx.lineTo(this.width/2 - 15, 10);
                ctx.fill();
            }
            
            // Lõi cưa
            ctx.fillStyle = '#ff3333';
            ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
            
            ctx.restore();
        }

        applyEffect(target) {
            // Pha 0: Gây 1 dame mỗi 0.25s (15 frames)
            if (this.phase === 0) {
                let tick = this.targetTickMap.get(target) || 0;
                if (tick <= 0) {
                    target.takeDamage(1);
                    this.targetTickMap.set(target, 15); 
                }
            } 
            // Các pha sau: Gây 10 dame 1 lần khi bay xuyên qua
            else {
                if (!this.hitTargets.has(target)) {
                    target.takeDamage(10);
                    this.hitTargets.add(target);
                }
            }
        }
    }
    class HaiPhongCitySpawner {
        constructor(x, y, owner) {
            this.owner = owner;
            this.active = true;
            this.shotsFired = 0;
            this.maxShots = 60;
            this.tick = 0;
            // Xả 10 viên trong 1.2s (72 frames) => 1 viên mỗi 7 frames
            this.fireRate = 3; 
            this.frozenTimer = 0;
        }
        
        update() {
            if (this.frozenTimer > 0) { this.frozenTimer--; return; }
            
            this.tick++;
            if (this.tick >= this.fireRate) {
                this.tick = 0;
                this.fireShot();
                this.shotsFired++;
                if (this.shotsFired >= this.maxShots) {
                    this.active = false; // Xong 10 viên thì tự hủy
                }
            }
        }
        
        fireShot() {
            let opponent = (this.owner === player1) ? player2 : player1;
            
            // Tìm vị trí hiện tại của địch để lấy góc bắn (ngắm lại mỗi lần bắn)
            let startX = this.owner.x + this.owner.width / 2;
            let startY = this.owner.y + this.owner.height / 2;
            let targetX = opponent.x + opponent.width / 2;
            let targetY = opponent.y + opponent.height / 2;
            
            let angle = Math.atan2(targetY - startY, targetX - startX);
            let speed = 30; // Tốc độ bay của đạn
            let vx = Math.cos(angle) * speed;
            let vy = Math.sin(angle) * speed;
            
            // Tạo 1 viên đạn DirectedProjectile (Màu đỏ cho ngầu như Hoa Phượng)
            let proj = new DirectedProjectile(
                startX, startY - 10, // Bắn ra từ giữa người chơi
                vx, vy,
                '#ff0000', // Đạn màu đỏ
                this.owner, 
                1, // Dame: 2
                12, 12 // Kích thước đạn
            );
            projectiles.push(proj);
        }
        
        draw() {} // Bản thân bộ xả này tàng hình, chỉ có đạn mới vẽ ra
        applyEffect() {} // Không gây sát thương trực tiếp
    }

        update() {
            if (this.frozenTimer > 0) { this.frozenTimer--; return; }
            this.x += this.vx;
            this.animTick++;

            // Giảm hồi chiêu dame (6 frames = 0.1s ở 60fps)
            for (let [target, tick] of this.targetTickMap.entries()) {
                if (tick > 0) this.targetTickMap.set(target, tick - 1);
            }

            // Xóa rồng khi bay khuất màn hình

        draw() {

            if (!this.facingRight) ctx.scale(-1, 1); // Lật ảnh nếu quay trái
            
            // Vẽ hơi thở hình quạt (Dragon's Breath) - Tỏa xuống dưới
            // Quạt nghiêng về phía trước và dưới
            ctx.fillStyle = (this.animTick % 4 < 2) ? 'rgba(186, 85, 211, 0.6)' : 'rgba(138, 43, 226, 0.4)';

            ctx.moveTo(70, -10); // Phát ra từ mõm
            ctx.lineTo(250, 300); // Rộng ra phía trước
            ctx.lineTo(-50, 300); // Rộng ra phía sau (chiều sâu của quạt)
            ctx.fill();

            // -- VẼ RỒNG ENDER (MINECRAFT STYLE) --
            // 1. Đuôi rồng
            ctx.fillStyle = '#111111';
            ctx.fillRect(-120, -5, 30, 15);
            ctx.fillRect(-150, -2, 30, 10);
            
            // 2. Thân rồng
            ctx.fillStyle = '#1a1a1a'; // Đen xám
            ctx.fillRect(-90, -15, 110, 30);
            
            // Gai trên lưng rồng
            ctx.fillStyle = '#333333';
            for(let i = 0; i < 4; i++) {
                ctx.fillRect(-70 + (i*25), -25, 10, 10);
            }

            // 3. Cổ và Đầu
            ctx.fillRect(20, -25, 30, 20); // Cổ
            ctx.fillRect(40, -40, 35, 30); // Đầu vuông
            ctx.fillRect(75, -25, 25, 15); // Mõm dài ra trước
            
            // 4. Mắt phát sáng tím
            ctx.fillStyle = '#aa00ff';
            ctx.shadowBlur = 10; ctx.shadowColor = '#aa00ff';
            ctx.fillRect(55, -35, 10, 8);
            ctx.shadowBlur = 0;
            
            // 5. Chân rồng
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(-60, 15, 15, 25);
            ctx.fillRect(0, 15, 15, 25);
            // Móng vuốt
            ctx.fillStyle = '#555555';
            ctx.fillRect(-55, 40, 10, 5);
            ctx.fillRect(5, 40, 10, 5);

            // 6. Cánh khối vuông đập lên xuống
            let wingOffset = Math.sin(this.animTick * 0.25) * 30; // Chuyển động đập
            ctx.fillStyle = '#0d0d0d';
            ctx.beginPath();
            ctx.moveTo(-40, -15); // Gốc cánh
            ctx.lineTo(-10, -80 + wingOffset); // Chóp trên
            ctx.lineTo(-90, -60 + wingOffset); // Chóp đuôi cánh
            ctx.closePath();
            ctx.fill();
            // Xương cánh
            ctx.strokeStyle = '#222222'; ctx.lineWidth = 3;
            ctx.stroke();

            ctx.restore();
        }

        applyEffect(target) {
            // Check timer giật dame, 6 frame = 0.1s
            let tick = this.targetTickMap.get(target) || 0;
            if (tick <= 0) {
                target.takeDamage(this.damage);
                this.targetTickMap.set(target, 6); // Reset tick
            }
        }
    }

    class TrampleFoot {
        constructor(x, owner) {
            this.width = 120;
            this.height = 200;
            this.x = x;
            this.y = -this.height - 100; // Xuất hiện tít trên trời
            this.owner = owner;
            this.damage = 27;
            this.active = true;
            this.frozenTimer = 0;
            
            this.state = 'falling'; // Trạng thái: rơi, chạm đất, nhấc lên
            this.vy = 30; // Tốc độ rơi cực gắt
            this.groundTimer = 25; // Nằm trên đất khoảng gần nửa giây
            
            this.hasDealtDamage = false;
        }
        
        update() {
            if (this.frozenTimer > 0) { this.frozenTimer--; return; }
            
            let opponent = (this.owner === player1) ? player2 : player1;

            if (this.state === 'falling') {
                this.y += this.vy;
                
                // Kiểm tra va chạm: Chạm vào địch là gây dame luôn, đồng thời đè địch xuống
                if (this.y + this.height > opponent.y && 
                    this.y < opponent.y + opponent.height &&
                    this.x < opponent.x + opponent.width &&
                    this.x + this.width > opponent.x) {
                    
                    // Nổ dame ngay lập tức khi vừa chạm (chỉ nổ 1 lần)
                    if (!this.hasDealtDamage) {
                        opponent.takeDamage(this.damage);
                        this.hasDealtDamage = true;
                    }
                    
                    // Ép vị trí Y của địch xuống sát lòng bàn chân (vẫn đè xuống đất)
                    opponent.y = this.y + this.height;
                    opponent.vy = this.vy; 
                    opponent.onGround = false;
                }

                // Kiểm tra chạm mặt đất (đã bỏ qua bậc đá trên không)
                let hitGround = false;
                let groundY = canvas.height - groundHeight;
                
                if (this.y + this.height >= groundY) {
                    this.y = groundY - this.height;
                    hitGround = true;
                }

                if (hitGround) {
                    this.state = 'grounded';
                    this.vy = 0;
                    this.spawnParticles(); // Văng sỏi đá khi chạm đất
                }

            } else if (this.state === 'grounded') {
                this.groundTimer--;
                if (this.groundTimer <= 0) {
                    this.state = 'rising';
                    this.vy = -12; // Tốc độ nhấc chân lên
                }
            } else if (this.state === 'rising') {
                this.y += this.vy;
                if (this.y < -this.height - 100) {
                    this.active = false; // Xóa khỏi bộ nhớ khi bay khuất
                }
            }
        }
        
        spawnParticles() {
            let colors = ['#888888', '#555555', '#a0522d', '#d2b48c']; // Màu đá vụn và bụi đất
            for (let i = 0; i < 25; i++) {
                let px = this.x + Math.random() * this.width;
                let py = this.y + this.height - 5;
                let pvx = (Math.random() - 0.5) * 18; // Văng sang 2 bên
                let pvy = -Math.random() * 8 - 2; // Bắn nảy lên
                let c = colors[Math.floor(Math.random() * colors.length)];
                projectiles.push(new DustParticle(px, py, pvx, pvy, c));
            }
        }

        draw() {
            if (!this.active) return;
            ctx.save();
            
            // Vẽ bàn chân nghiêng bên cạnh (Side View)
            ctx.fillStyle = '#f2c6a0'; // Màu da
            ctx.strokeStyle = '#c49a7a'; // Viền màu da tối
            ctx.lineWidth = 3;

            ctx.beginPath();
            // Cổ chân trái
            ctx.moveTo(this.x + 30, this.y); 
            ctx.lineTo(this.x + 30, this.y + this.height - 40); 
            
            // Bo tròn gót chân
            ctx.quadraticCurveTo(this.x + 20, this.y + this.height, this.x + 50, this.y + this.height);
            
            // Lòng bàn chân thẳng
            ctx.lineTo(this.x + this.width - 20, this.y + this.height);
            
            // Mũi chân kéo dài và bo tròn nhẹ
            ctx.quadraticCurveTo(this.x + this.width + 10, this.y + this.height - 5, this.x + this.width, this.y + this.height - 30);
            
            // Mu bàn chân cong ngược về cổ chân
            ctx.quadraticCurveTo(this.x + 70, this.y + this.height - 40, this.x + 70, this.y);
            
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Đổ bóng gradient bên trong để tạo độ khối 2D cho gầm chân
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.beginPath();
            ctx.moveTo(this.x + 35, this.y + this.height - 10);
            ctx.lineTo(this.x + this.width - 25, this.y + this.height - 10);
            ctx.quadraticCurveTo(this.x + this.width - 5, this.y + this.height - 15, this.x + this.width - 15, this.y + this.height - 25);
            ctx.quadraticCurveTo(this.x + 65, this.y + this.height - 30, this.x + 65, this.y + 50);
            ctx.lineTo(this.x + 30, this.y + 50);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#2b1b11'; // Màu lông đen xì / nâu đậm
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.beginPath();

            // 1. Lông mọc tủa ra sau bắp chân (lề trái)
            for (let i = 0; i < 6; i++) {
                let hY = this.y + 10 + i * 25;
                if (hY < this.y + this.height - 40) {
                    ctx.moveTo(this.x + 30, hY);
                    // Vẽ nét cong cong cho nó xoăn
                    ctx.quadraticCurveTo(this.x + 10, hY + 10, this.x + 22, hY + 20);
                }
            }

            // 2. Lông mọc tủa ra trước ống đồng (lề phải)
            for (let i = 0; i < 5; i++) {
                let hY = this.y + 20 + i * 30;
                if (hY < this.y + this.height - 50) {
                    ctx.moveTo(this.x + 70, hY);
                    // Vẽ nét cong cong cho nó xoăn
                    ctx.quadraticCurveTo(this.x + 90, hY + 5, this.x + 78, hY + 15);
                }
            }

            // 3. Lông rậm rạp dính trên bề mặt da bắp chân
            for (let i = 0; i < 15; i++) {
                let hX = this.x + 35 + Math.random() * 30; // Rải rác giữa bắp chân
                let hY = this.y + 20 + Math.random() * 100;
                if (hY < this.y + this.height - 40) {
                    ctx.moveTo(hX, hY);
                    ctx.quadraticCurveTo(hX - 8, hY + 5, hX + 3, hY + 12);
                }
            }
            
            ctx.stroke();
            ctx.restore();
        }

        applyEffect(target) {
            // Sát thương đã được xử lý khép kín trong hàm update() 
            // Cứ để trống hàm này để tránh bị trừ dame 2 lần do vòng lặp quét của game.
        }
    }

    function checkCollisionAdvanced(rect, target) {
        if (rect instanceof EarthSpikeProjectile) {
            if (rect.isWarning) return false;
            let spikeRect = { x: rect.x, y: rect.y - rect.height, width: rect.width, height: rect.height };
            return (spikeRect.x < target.x + target.width &&
                    spikeRect.x + spikeRect.width > target.x &&
                    spikeRect.y < target.y + target.height &&
                    spikeRect.y + spikeRect.height > target.y);
        } else if (rect instanceof PlasmaBomb) {
            if (!rect.isExploding) return false; 
            let circleX = rect.targetX;
            let circleY = rect.targetY;
            let radius = 400; 
            let closestX = Math.max(target.x, Math.min(circleX, target.x + target.width));
            let closestY = Math.max(target.y, Math.min(circleY, target.y + target.height));
            let dx = circleX - closestX;
            let dy = circleY - closestY;
            return (dx * dx + dy * dy) < (radius * radius);
        } else if (rect instanceof MagicOrbProjectile) {
            if (!rect.isExploding) return false;
            let circleX = rect.x;
            let circleY = rect.y;
            let radius = 120;
            let closestX = Math.max(target.x, Math.min(circleX, target.x + target.width));
            let closestY = Math.max(target.y, Math.min(circleY, target.y + target.height));
            let dx = circleX - closestX;
            let dy = circleY - closestY;
            return (dx * dx + dy * dy) < (radius * radius);
        } else if (rect instanceof SoundVisual) {
            return false; 
        } else if (rect instanceof EnderDragonSkill) {
            // Tính toán hitbox hình quạt (đơn giản hóa thành khối chữ nhật lớn quét từ miệng rồng xuống đất)
            let mouthX = rect.facingRight ? rect.x + rect.width - 20 : rect.x + 20;
            let mouthY = rect.y + rect.height / 2;
            
            let breathWidth = 300; // Độ rộng của hơi thở dưới đất
            let breathHeight = 350; // Quét sâu xuống lòng đất qua vị trí player
            
            // Tọa độ hộp hơi thở
            let bX = rect.facingRight ? mouthX - 50 : mouthX - breathWidth + 50;
            let bY = mouthY;

            return (bX < target.x + target.width &&
                    bX + breathWidth > target.x &&
                    bY < target.y + target.height &&
                    bY + breathHeight > target.y);
        } else if (rect instanceof BoomerangSawProjectile) {
            let circleX = rect.x + rect.width/2;
            let circleY = rect.y + rect.height/2;
            let radius = rect.width/2; 
            let closestX = Math.max(target.x, Math.min(circleX, target.x + target.width));
            let closestY = Math.max(target.y, Math.min(circleY, target.y + target.height));
            let dx = circleX - closestX;
            let dy = circleY - closestY;
            return (dx * dx + dy * dy) < (radius * radius);
            } else {
            return (rect.x < target.x + target.width &&
                    rect.x + rect.width > target.x &&
                    rect.y < target.y + target.height &&
                    rect.y + rect.height > target.y);
        } 
    }

    function endGame(isMentalDamage = false) {
        gameActive = false;
        clearInterval(timerInterval);
        const gameOverUI = document.getElementById('game-over');
        gameOverUI.style.display = 'block';

        if (isMentalDamage) {
            let loserNum = (player1.hp <= 0) ? 1 : 2;
            gameOverUI.innerText = `P${loserNum} thua vì : emotional damage!`;
        } else {
            if (player1.hp === player2.hp) gameOverUI.innerText = "HÒA!";
            else if (player1.hp > player2.hp) gameOverUI.innerText = "PLAYER 1 THẮNG!";
            else gameOverUI.innerText = "PLAYER 2 THẮNG!";
        }
        
        gameOverUI.innerHTML += "<br><span style='font-size:24px; cursor:pointer; color: #aaa;' onclick='location.reload()'>Nhấn để làm lại từ đầu</span>";
    }

    function gameLoop() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#3a2e24'; 
        ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
        ctx.fillStyle = '#1e5e3a'; 
        ctx.fillRect(0, canvas.height - groundHeight, canvas.width, 10);
        ctx.fillStyle = '#666';
        for (let plat of platforms) {
            ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
            ctx.fillStyle = '#888'; 
            ctx.fillRect(plat.x, plat.y, plat.w, 4);
            ctx.fillStyle = '#666';
        }

        player1.update();
        player1.draw();
        player2.update();
        player2.draw();

        for (let i = plants.length - 1; i >= 0; i--) {
            let p = plants[i];
            p.update();
            p.draw();
            if (!p.active) plants.splice(i, 1);
        }

        for (let i = suns.length - 1; i >= 0; i--) {
            suns[i].update();
            suns[i].draw();
            if (!suns[i].active) suns.splice(i, 1);
        }

        if (player2.isDashing && player2.skillType === 'lightningDash' && checkCollisionAdvanced(player2, player1) && !player2.hasHitWithDash) {
            player1.takeDamage(7); player2.hasHitWithDash = true;
        }
        if (player1.isDashing && player1.skillType === 'lightningDash' && checkCollisionAdvanced(player1, player2) && !player1.hasHitWithDash) {
            player2.takeDamage(7); player1.hasHitWithDash = true;
        }

        if (player1.fireSoulTimer > 0 && checkCollisionAdvanced(player1, player2)) {
            player2.fireSoulBurnTimer = 180;
        }
        if (player2.fireSoulTimer > 0 && checkCollisionAdvanced(player2, player1)) {
            player1.fireSoulBurnTimer = 180;
        }

        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i];
            p.update();
            p.draw();

            if (p.active) {
                if (p.owner !== player1 && checkCollisionAdvanced(p, player1)) {
                    let oldDmg = p.damage;
                    if (player1.magnetizedTimer > 0 && typeof p.damage === 'number') p.damage *= 3;
                    if (typeof p.applyEffect === 'function') p.applyEffect(player1);
                    p.damage = oldDmg; 
                }
                if (p.owner !== player2 && checkCollisionAdvanced(p, player2)) {
                    let oldDmg = p.damage;
                    if (player2.magnetizedTimer > 0 && typeof p.damage === 'number') p.damage *= 3;
                    if (typeof p.applyEffect === 'function') p.applyEffect(player2);
                    p.damage = oldDmg;
                }
                
                for (let j = 0; j < minions.length; j++) {
                    let m = minions[j];
                    if (!m.isDead && p.owner !== m.owner && checkCollisionAdvanced(p, m)) {
                        if (typeof p.applyEffect === 'function') p.applyEffect(m);
                    }
                }

                for (let k = 0; k < plants.length; k++) {
                    let plant = plants[k];
                    if (!plant.isDead && p.owner !== plant.owner && checkCollisionAdvanced(p, plant)) {
                        let oldDmg = p.damage;
                        if (plant.magnetizedTimer && plant.magnetizedTimer > 0 && typeof p.damage === 'number') p.damage *= 3;
                        if (typeof p.applyEffect === 'function') p.applyEffect(plant);
                        p.damage = oldDmg;
                    }
                }
            }
            if (!p.active) projectiles.splice(i, 1);
        }

        for (let i = minions.length - 1; i >= 0; i--) {
            let m = minions[i];
            m.update();
            m.draw();
            if (!m.active) {
                minions.splice(i, 1);
            }
        }

        document.getElementById('p1-health').style.width = (player1.hp / player1.maxHp * 100) + '%';
        document.getElementById('p2-health').style.width = (player2.hp / player2.maxHp * 100) + '%';
        
        document.getElementById('p1-hp-text').innerText = Math.floor(player1.hp) + "/" + player1.maxHp;
        document.getElementById('p2-hp-text').innerText = Math.floor(player2.hp) + "/" + player2.maxHp;
        
        let p1OnlyPassive = ['bulletsBuff', 'poisonBullets', 'energy', 'wings', 'roastedCheese', 'stiffLegs'].includes(player1.skillType);
        let p1SkillText = p1OnlyPassive ? "Bị động" : `Skill: ${(player1.skillCooldown/60).toFixed(1)}s`;
        if(player1.skillCooldown <= 0 && !p1OnlyPassive) p1SkillText = "Skill Sẵn sàng";
        document.getElementById('p1-cd').innerText = p1SkillText;

        let p2OnlyPassive = ['bulletsBuff', 'poisonBullets', 'energy', 'wings', 'roastedCheese', 'stiffLegs'].includes(player2.skillType);
        let p2SkillText = p2OnlyPassive ? "Bị động" : `Skill: ${(player2.skillCooldown/60).toFixed(1)}s`;
        if(player2.skillCooldown <= 0 && !p2OnlyPassive) p2SkillText = "Skill Sẵn sàng";
        document.getElementById('p2-cd').innerText = p2SkillText;
            
        document.getElementById('p1-dash-cd').innerText = player1.baseDashCooldown > 0 
            ? `Lướt: ${(player1.baseDashCooldown/60).toFixed(1)}s` : `Lướt Sẵn sàng`;
        document.getElementById('p2-dash-cd').innerText = player2.baseDashCooldown > 0 
            ? `Lướt: ${(player2.baseDashCooldown/60).toFixed(1)}s` : `Lướt Sẵn sàng`;

        if (player1.isDead || player2.isDead) {
            if (player1.mentalDamage || player2.mentalDamage) {
                let deadPlayer = player1.isDead ? player1 : player2;
                
                ctx.fillStyle = '#ff0000';
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 4;
                ctx.font = 'bold 100px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('Béo quá !', deadPlayer.x + deadPlayer.width / 2, deadPlayer.y - 20);
                ctx.strokeText('Béo quá !', deadPlayer.x + deadPlayer.width / 2, deadPlayer.y - 20);
                
                endGame(true);
                return; 
            } else {
                endGame(false);
            }
        }

        requestAnimationFrame(gameLoop);
    }
    class KamehamehaBeam {
        constructor(owner) {
            this.owner = owner;
            this.active = true;
            this.timer = 300; // Bắn liên tục trong 5s (5 * 60 fps)
            // Khởi tạo góc bắn ra phía trước mặt
            this.angle = owner.facingRight ? 0 : Math.PI;
            this.damage = 3;
            this.frozenTimer = 0;
        }

        update() {
            if (this.frozenTimer > 0) { this.frozenTimer--; return; }
            this.timer--;

            // Hủy tia nếu hết 5s hoặc chủ nhân hẻo
            if (this.timer <= 0 || this.owner.isDead) {
                this.active = false;
                this.owner.isKamehamehaing = false;
                return;
            }

            // Điều khiển góc xoay của tia chầm chậm (sử dụng phím lên/xuống tương đương W/S)
            if (keys[this.owner.controls.up]) {
                this.angle -= 0.015; // Ngược chiều kim đồng hồ
            }
            if (keys[this.owner.controls.down]) {
                this.angle += 0.015; // Cùng chiều kim đồng hồ
            }

            // Khóa nhân vật tại chỗ (bất động)
            this.owner.vx = 0;
            this.owner.vy = 0;

            // Xử lý gây 4 sát thương mỗi 0.25s (15 frames)
            if (this.timer % 15 === 0) {
                this.checkCollision();
            }
        }

        checkCollision() {
            let ox = this.owner.x + this.owner.width / 2;
            let oy = this.owner.y + this.owner.height / 2;
            let targets = [];
            
            // Lấy mục tiêu là kẻ địch, lính, và cây cối
            let enemy = (this.owner === player1) ? player2 : player1;
            targets.push(enemy);
            minions.forEach(m => { if (m.owner !== this.owner && m.active) targets.push(m); });
            plants.forEach(p => { if (p.owner !== this.owner && p.active) targets.push(p); });

            let beamLength = 2000; // Chiều dài tia xâu chuỗi bản đồ
            let beamWidth = 60;    // Độ to của tia

            for (let target of targets) {
                if (target.isDead) continue;
                let tx = target.x + target.width / 2;
                let ty = target.y + target.height / 2;

                let dx = tx - ox;
                let dy = ty - oy;
                
                // Toán học: Xoay tọa độ mục tiêu ngược lại theo góc của tia để check hình chữ nhật
                let rotatedX = dx * Math.cos(-this.angle) - dy * Math.sin(-this.angle);
                let rotatedY = dx * Math.sin(-this.angle) + dy * Math.cos(-this.angle);

                // Nếu mục tiêu nằm trong tầm hitbox của tia
                if (rotatedX > 0 && rotatedX < beamLength && Math.abs(rotatedY) < (beamWidth / 2 + target.width / 2)) {
                    target.takeDamage(this.damage);
                }
            }
        }

        draw() {
            if (!this.active) return;
            let ox = this.owner.x + this.owner.width / 2;
            let oy = this.owner.y + this.owner.height / 2;

            ctx.save();
            ctx.translate(ox, oy);
            ctx.rotate(this.angle);

            ctx.shadowBlur = 25;
            ctx.shadowColor = '#00BFFF';
            
            ctx.fillStyle = 'rgba(0, 191, 255, 0.8)';
            ctx.fillRect(0, -25, 2000, 50);
            
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, -12, 2000, 24);

            ctx.beginPath();
            ctx.arc(0, 0, 45 + Math.random() * 15, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(135, 206, 250, 0.9)';
            ctx.fill();

            ctx.restore();
        }

        applyEffect() {
        }
    }

    // --- BỘ CLASS DÀNH RIÊNG CHO HẮC THIỂM ---
    
    // 1. Hitbox đấm thường tầm gần
    class MeleePunchHitbox {
        constructor(x, y, facingRight, owner) {
            this.width = 40; this.height = 32; 
            this.x = x; this.y = y;
            this.facingRight = facingRight;
            this.owner = owner;
            this.damage = 10;
            this.active = true;
            this.timer = 5; // Biến mất siêu nhanh (hitbox đấm)
            this.hasHit = false;
            this.frozenTimer = 0;
        }
        update() {
            if(this.frozenTimer > 0) { this.frozenTimer--; return; }
            this.x = this.facingRight ? this.owner.x + this.owner.width : this.owner.x - this.width;
            this.y = this.owner.y;
            this.timer--;
            if(this.timer <= 0) this.active = false;
        }
        draw() {
            if(!this.active) return;
            // Hiệu ứng gió nhẹ ở nắm đấm
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.arc(this.x + this.width/2, this.y + this.height/2, 15, 0, Math.PI*2);
            ctx.fill();
        }
        applyEffect(target) {
            if(!this.hasHit) {
                target.takeDamage(this.damage);
                this.hasHit = true;
            }
        }
    }

    // 2. Hitbox bắt mục tiêu khi lướt
    class BlackFlashDashHitbox {
        constructor(owner) {
            this.owner = owner;
            this.width = owner.width + 20; 
            this.height = owner.height;
            this.active = true;
            this.frozenTimer = 0;
        }
        update() {
            if(this.frozenTimer > 0) { this.frozenTimer--; return; }
            this.x = this.owner.facingRight ? this.owner.x : this.owner.x - 20;
            this.y = this.owner.y;
            
            // Xóa hitbox nếu hụt (hết lướt)
            if (!this.owner.isBlackFlashing || !this.owner.isDashing) {
                this.active = false;
                this.owner.isBlackFlashing = false;
            }
        }
        draw() {} // Ẩn tàng hình
        
        applyEffect(target) {
            if (!this.active || target === this.owner) return;
            
            // NẾU TRÚNG:
            this.active = false;
            this.owner.isDashing = false; // Dừng lại ngay
            this.owner.isBlackFlashing = false;
            this.owner.vx = 0; // Thắng gấp
            
            // Đóng băng màn hình ~0.2s (12 frames ở 60fps)
            let freezeFrames = 12;
            this.owner.frozenTimer = freezeFrames;
            target.frozenTimer = freezeFrames;
            
            // Hiệu ứng Flash màn hình + Sét đen
            projectiles.push(new ScreenFlashVisual(freezeFrames));
            projectiles.push(new BlackFlashStrike(target, this.owner, freezeFrames));
        }
    }

    // 3. Hiệu ứng Flash màn hình 
    class ScreenFlashVisual {
        constructor(duration) {
            this.timer = duration;
            this.active = true;
        }
        update() {
            this.timer--;
            if(this.timer <= 0) this.active = false;
        }
        draw() {
            if(!this.active) return;
            ctx.fillStyle = `rgba(255, 255, 255, ${this.timer / 12})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        applyEffect() {}
    }

    // 4. Sét đen ziczac + Sát thương đẩy lùi
    class BlackFlashStrike {
        constructor(target, owner, delay) {
            this.target = target;
            this.owner = owner;
            this.delay = delay; 
            this.active = true;
            this.damage = 50; // Sát thương cực mạnh
            this.duration = 5; // Lưu tia sét thêm xíu sau khi bung sát thương
        }
        update() {
            if (this.delay > 0) {
                this.delay--;
                // Vừa hết Time Freeze => Nổ damage + Đẩy lùi
                if (this.delay === 0) {
                    this.target.takeDamage(this.damage);
                    let knockbackDir = this.owner.x < this.target.x ? 1 : -1;
                    this.target.vx = knockbackDir * 25; // Đẩy lùi rất xa
                    this.target.vy = -6; // Hất bổng
                }
            } else {
                this.duration--;
                if (this.duration <= 0) this.active = false;
            }
        }
        draw() {
            if (!this.active) return;
            // Vẽ Sét Đen rách màn hình ngay từ lúc đang Freeze
            let x = this.target.x + this.target.width / 2;
            let y = this.target.y + this.target.height / 2;
            
            ctx.save();
            ctx.strokeStyle = '#000000'; // Sét đen
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff0000'; // Đỏ lòi ra ngoài nhìn cực tà đạo
            ctx.lineWidth = 5;
            
            for (let i = 0; i < 6; i++) {
                ctx.beginPath();
                ctx.moveTo(x, y);
                let curX = x;
                let curY = y;
                for (let j = 0; j < 4; j++) {
                    let angle = (Math.PI * 2 / 6) * i + (Math.random() - 0.5);
                    let dist = 30 + Math.random() * 40;
                    curX += Math.cos(angle) * dist;
                    curY += Math.sin(angle) * dist;
                    ctx.lineTo(curX, curY);
                }
                ctx.stroke();
            }
            ctx.restore();
        }
        applyEffect() {}
    }
    
</script>

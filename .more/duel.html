<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Duel - võ đài của GAY</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        
        #selection-screen {
            position: absolute;
            width: 950px;
            background: rgba(0, 0, 0, 0.9);
            border: 4px solid #555;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            z-index: 10;
        }
        .settings-container {
            background: #333;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: inline-block;
            border: 2px solid #aaa;
        }
        .settings-container label {
            font-weight: bold;
            font-size: 18px;
            margin: 0 15px;
        }
        .settings-container input {
            width: 70px;
            font-size: 18px;
            padding: 5px;
            font-weight: bold;
            text-align: center;
            border-radius: 5px;
            border: none;
        }
        .players-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }
        .player-select {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #fff;
            width: 48%;
        }
        .player-select h2 { margin-top: 0; }
        
        .skill-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .skill-grid::-webkit-scrollbar { width: 8px; }
        .skill-grid::-webkit-scrollbar-track { background: #333; border-radius: 4px; }
        .skill-grid::-webkit-scrollbar-thumb { background: #777; border-radius: 4px; }
        .skill-grid::-webkit-scrollbar-thumb:hover { background: #999; }

        .skill-btn {
            display: block; width: 100%; 
            padding: 15px 5px;
            font-size: 15px;
            font-weight: bold; cursor: pointer;
            background-color: #444; color: white; border: none; border-radius: 5px;
            transition: 0.2s;
        }
        .skill-btn:hover { background-color: #666; }
        .selected-text { color: #ff0; font-weight: bold; font-size: 16px; margin-top: 15px; height: 20px;}
        .instruction { font-size: 13px; color: #ccc; margin-top: 10px; margin-bottom: 15px; text-align: left; }
        
        #start-btn {
            font-size: 24px; padding: 15px 40px; font-weight: bold;
            background-color: #2e8b57; color: white; border: none; border-radius: 10px;
            cursor: pointer; transition: 0.3s;
        }
        #start-btn:disabled { background-color: #555; cursor: not-allowed; }
        #start-btn:not(:disabled):hover { background-color: #3cb371; transform: scale(1.05); }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
        }
        canvas {
            width: 100%;
            height: 100%;
            background-color: #222;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .health-bar-container {
            width: 30vw; height: 30px;
            background-color: #444;
            border: 3px solid #fff;
            position: relative;
        }
        #p1-health { background-color: #ff4d4d; height: 100%; width: 100%; transition: width 0.1s; }
        #p2-health { background-color: #4da6ff; height: 100%; width: 100%; transition: width 0.1s; float: right; }
        .hp-text {
            position: absolute; top: 0; width: 100%; text-align: center;
            font-weight: bold; color: white; line-height: 30px; text-shadow: 1px 1px 2px black;
        }
        .skill-cooldown {
            position: absolute; top: 40px; font-size: 16px; font-weight: bold; color: #ff0;
            text-shadow: 1px 1px 2px black;
        }
        .dash-cooldown {
            position: absolute; top: 60px; font-size: 14px; font-weight: bold; color: #fff;
            text-shadow: 1px 1px 2px black;
        }
        #p1-cd, #p1-dash-cd { left: 0; }
        #p2-cd, #p2-dash-cd { right: 0; text-align: right; }
        #timer {
            font-size: 40px; font-weight: bold;
            background-color: rgba(0,0,0,0.6);
            padding: 5px 20px; border-radius: 8px;
            height: fit-content;
        }
        #game-over {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px; font-weight: bold;
            text-align: center; display: none;
            background: rgba(0,0,0,0.8); padding: 30px; border-radius: 15px;
            border: 2px solid white; z-index: 20;
            pointer-events: auto;
        }
        /* CODE THÊM MỚI: Style cho nút Random */
        .player-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }
        .player-header h2 { margin: 0; }
        .random-btn {
            background-color: #ff8c00;
            color: white;
            border: 1px solid white;
            border-radius: 5px;
            padding: 5px 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            margin-left: 15px;
            transition: 0.2s;
        }
        .random-btn:hover { background-color: #cc7000; transform: scale(1.05); }
    </style>
</head>

<script>
    // --- LÔGIC CHỌN KỸ NĂNG ---
    let p1Skill = null;
    let p2Skill = null;

    function selectSkill(player, skillId, skillName) {
        if (player === 1) {
            p1Skill = skillId;
            document.getElementById('p1-chosen').innerText = "Đã chọn: " + skillName;
        } else {
            p2Skill = skillId;
            document.getElementById('p2-chosen').innerText = "Đã chọn: " + skillName;
        }
        if (p1Skill && p2Skill) {
            document.getElementById('start-btn').disabled = false;
        }
    }

    // --- LÔGIC RANDOM KỸ NĂNG ---
    const allSkillsList = [
        {id: 'fireball', name: 'Fireball'}, {id: 'lightningDash', name: 'Lightning Dash'},
        {id: 'waterShield', name: 'Water Shield'}, {id: 'earthSpike', name: 'Earth Spike'},
        {id: 'windBullets', name: 'Wind Bullets'}, {id: 'snowRolling', name: 'Snow Rolling'},
        {id: 'bulletsBuff', name: 'Bullets Buff'}, {id: 'diamondMeteorite', name: 'Diamond Meteor'},
        {id: 'poisonBullets', name: 'Poison Bullets'}, {id: 'lightHole', name: 'Light Hole'},
        {id: 'darkHole', name: 'Dark Hole'}, {id: 'weight', name: 'Increase Gravity'},
        {id: 'sound', name: 'Maximum Sound'}, {id: 'energy', name: 'Energy Bullets'},
        {id: 'time', name: 'Time Freezes'}, {id: 'space', name: 'Space Teleport'},
        {id: 'plasmaExplosion', name: 'Plasma Explode'}, {id: 'chaosEnchain', name: 'Chaos Enchain'},
        {id: 'fireSoul', name: 'Fire Soul'}, {id: 'scratchingBlood', name: 'Scratching Blood'},
        {id: 'wings', name: 'Wings'}, {id: 'swordEnergy', name: 'Sword Energy'},
        {id: 'magicOrb', name: 'Magic Orb'}, {id: 'bananaApprentice', name: 'Banana Apprentice'},
        {id: 'roastedCheese', name: 'Roasted Cheese'}, {id: 'bubbleBall', name: 'Bubble Ball'},
        {id: 'spit', name: 'Spit'}, {id: 'magneticAttraction', name: 'Magnet Attract'},
        {id: 'plantingTrees', name: 'Planting Trees'}, {id: 'chickenBodybuilder', name: 'Chicken Bodybuilder'},
        {id: 'hollowPurple', name: 'Hư Thức Tử'}, {id: 'haiPhongCity', name: 'Hai Phong City'},
        {id: 'boomerangSaw', name: 'Boomerang Saw'}, {id: 'trample', name: 'Trample'},
        {id: 'dragonBreath', name: 'Dragon Breath'}, {id: 'stiffLegs', name: 'Stiff Legs'},{id: 'kamehameha', name: 'Kamehameha'},
        {id: 'blackFlash', name: 'Hắc Thiểm' } ,
    ];

    function randomSkill(playerNum) {
        const randomIndex = Math.floor(Math.random() * allSkillsList.length);
        const chosen = allSkillsList[randomIndex];
        selectSkill(playerNum, chosen.id, chosen.name);
    }

    // --- LÔGIC TRÒ CHƠI ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const groundHeight = 50;
    const gravity = 0.5;
    
    let player1, player2;
    let projectiles = [];
    let minions = []; 
    let plants = []; 
    let suns = [];   
    let timer = 60;
    let gameActive = false;
    let timerInterval;
    let platforms = [];

    const keys = {
        a: false, d: false, w: false, s: false, f: false, g: false, h: false,
        ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false, l: false, k: false, j: false
    };

    window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
    window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

    class Player {
        constructor(x, y, color, controls, facingRight, skillType, maxHp) {
            this.x = x; this.y = y;
            this.width = 16; this.height = 32; 
            this.color = color;
            this.vx = 0; this.vy = 0;
            this.speed = 5.5; 
            this.jumpPower = -9.5;
            this.maxHp = maxHp;
            this.hp = maxHp;
            this.controls = controls;
            this.facingRight = facingRight;
            this.isDead = false;
            this.mentalDamage = false; 
            this.isBlocking = false;
            this.onGround = false;
            
            this.attackCooldown = 0;
            this.skillCooldown = 0;
            this.baseDashCooldown = 0;
            
            this.skillType = skillType; 
            
            this.isDashing = false;
            this.dashTimer = 0;
            this.hasHitWithDash = false; 

            this.isBlackFlashing = false;
            
            this.isBaseDashing = false;
            this.baseDashTimer = 0;

            this.waterShieldTimer = 0;

            this.jumpCount = 0;
            this.maxJumps = 2;
            this.prevUpKey = false;

            this.isChanneling = false;
            this.channelTimer = 0;
            this.channelMax = 0;

            this.poisonTimer = 0;
            this.inLightHole = false;
            this.inDarkHole = false;
            this.cantJumpTimer = 0; 
            this.frozenTimer = 0; 
            this.spaceBuffCount = 0; 
            this.plasmaChargeTimer = 0; 
            this.plasmaMark = null; 

            this.chainedTimer = 0;
            this.chainCenter = null;
            this.fireSoulTimer = 0;
            this.fireSoulBurnTimer = 0;
            this.scratchingBloodTick = 0;

            this.flightPoints = 10;
            this.isFlying = false;
            this.flightTick = 0;
            this.groundRegenTick = 0;

            this.activeOrb = null;

            this.spitCount = 0;
            this.bubbledTimer = 0;
            this.magnetizedTimer = 0;
            this.magnetPullTimer = 0; 
            this.magnetSource = null;

            this.magnetSource = null;
            this.isKamehamehaing = false; // Check xem có đang bắn Kamehameha không
        }

        getChannelTime(skillType) {
            switch(skillType) { 
                case 'earthSpike': return 5; 
                case 'snowRolling': return 7; 
                case 'sound': return 35; 
                case 'hollowPurple': return 150;
                case 'haiPhongCity': return 15;
                case 'kamehameha': return 75;
                default: return 0; 
            }
        }

        triggerCombo() {
            this.attackCooldown = Math.min(this.attackCooldown, 15);
        }

        update() {
            if (this.isDead) return;

            if (this.frozenTimer > 0) {
                this.frozenTimer--;
                this.vx = 0; 
                this.vy = 0; 
                return; 
            }

            if (this.attackCooldown > 0) this.attackCooldown--;
            if (this.skillCooldown > 0) this.skillCooldown--;
            if (this.baseDashCooldown > 0) this.baseDashCooldown--;
            if (this.waterShieldTimer > 0) this.waterShieldTimer--;
            if (this.cantJumpTimer > 0) this.cantJumpTimer--;

            if (this.bubbledTimer > 0) {
                this.bubbledTimer--;
                if (this.bubbledTimer <= 0) {
                    this.takeDamage(17);
                }
            }
            if (this.magnetizedTimer > 0) {
                this.magnetizedTimer--; 
            }
            if (this.magnetPullTimer > 0) {
                this.magnetPullTimer--; 
            }

            if (this.skillType === 'wings') {
                if (this.isFlying) {
                    this.flightTick++;
                    if (this.flightTick >= 60) {
                        this.flightPoints--;
                        this.flightTick = 0;
                        if (this.flightPoints <= 0) this.isFlying = false;
                    }
                }
            }

            if (this.skillType === 'scratchingBlood') {
                this.scratchingBloodTick++;
                if (this.scratchingBloodTick >= 300) {
                    this.hp -= 4;
                    if (this.hp <= 0) this.isDead = true;
                    this.scratchingBloodTick = 0;
                }
            }

            if (this.fireSoulBurnTimer > 0) {
                this.fireSoulBurnTimer--;
                if (this.fireSoulBurnTimer % 12 === 0) {
                    this.hp -= 1;
                    if (this.hp <= 0) this.isDead = true;
                }
            }

            let currentSpeedMult = 1;
            let currentJumpMult = 1;
            let currentGravityMult = 1;
            let canDash = true;
            let canSkill = true;
            let canAttack = true;

            if (this.isKamehamehaing) {
                canDash = false;
                canSkill = false;
                canAttack = false;
            }

            if (this.fireSoulTimer > 0) {
                this.fireSoulTimer--;
                currentSpeedMult *= 1.5;
            }

            if (this.inDarkHole) {
                currentSpeedMult *= 0.25;
                currentJumpMult *= 0.25;
                currentGravityMult *= 0.25;
                canDash = false;
                canSkill = false;
            } else if (this.inLightHole) {
                currentSpeedMult *= 0.5;
                currentJumpMult *= 0.5;
                currentGravityMult *= 0.5;
                canDash = false;
            }

            if (this.plasmaChargeTimer > 0) {
                this.plasmaChargeTimer--;
                currentSpeedMult *= 1.5; 
                canAttack = false;
                canSkill = false;
                if (this.plasmaChargeTimer <= 0) {
                    projectiles.push(new PlasmaBomb(this.x + this.width/2, this.y - 40, this.plasmaMark.x, this.plasmaMark.y, this));
                }
            }

            this.inDarkHole = false;
            this.inLightHole = false;

            if (this.poisonTimer > 0) {
                this.poisonTimer--;
                if (this.poisonTimer % 60 === 0) { 
                    this.takeDamage(1);
                }
            }

            this.isBlocking = keys[this.controls.block] && !this.isChanneling && !this.plasmaChargeTimer && this.bubbledTimer <= 0 && this.magnetPullTimer <= 0;

            if (this.isChanneling) {
                this.channelTimer--;
                this.vx = 0; 
                if (this.skillType === 'sound') this.vy = 0; 
                if (this.channelTimer <= 0) {
                    this.isChanneling = false;
                    this.useSkill();
                }
            } 
            else if (this.isBlocking) {
                this.vx = 0; 
            } 
            else if (!this.isDashing && !this.isBaseDashing) {
                
                if (this.bubbledTimer > 0) {
                    this.vx = 0; 
                } else if (this.magnetPullTimer > 0 && this.magnetSource) {
                    let dx = this.magnetSource.x + this.magnetSource.width/2 - (this.x + this.width/2);
                    let dy = this.magnetSource.y + this.magnetSource.height/2 - (this.y + this.height/2);
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > 30) {
                        this.vx = (dx / dist) * 40; 
                    } else {
                        this.vx = 0;
                    }
                } else {
                    if (keys[this.controls.left]) { this.vx = -this.speed * currentSpeedMult; this.facingRight = false; }
                    else if (keys[this.controls.right]) { this.vx = this.speed * currentSpeedMult; this.facingRight = true; }
                    else { this.vx = 0; }
                }

                if (keys[this.controls.attack] && this.attackCooldown <= 0 && canAttack) {
                    let isPoison = (this.skillType === 'poisonBullets');
                    let attackDamage = (this.skillType === 'bulletsBuff') ? 8 : 6;
                    
                    if (this.spaceBuffCount > 0) {
                        attackDamage *= 2;
                        this.spaceBuffCount--;
                    }

                    if (this.spitCount > 0) {
                        let proj = new Projectile(
                            this.facingRight ? this.x + this.width : this.x - 20, 
                            this.y + 15, 
                            this.facingRight ? 36 : -36,
                            '#32cd32', this, attackDamage + 4, 15, 10
                        );
                        projectiles.push(proj);
                        this.spitCount--;
                    } else if (this.skillType === 'stiffLegs') {
                        let proj = new StiffLegKick(
                            this.facingRight ? this.x + this.width : this.x - 130,
                            this.y,
                            this.facingRight,
                            this
                        );
                        // Kế thừa hiệu ứng x2 sát thương của Space Teleport (nếu có)
                        proj.damage = (attackDamage > 7) ? 16 : 8; 
                        projectiles.push(proj);
                    } else if (this.skillType === 'swordEnergy') {
                        let proj = new MeleeArcProjectile(
                            this.facingRight ? this.x + this.width : this.x - 100,
                            this.y - 25,
                            this.facingRight,
                            this
                        );
                        proj.damage = attackDamage;
                        projectiles.push(proj);
                    } else if (this.skillType === 'wings' && this.isFlying) {
                        let opponent = (this === player1) ? player2 : player1;
                        let myCenter = { x: this.x + this.width/2, y: this.y + this.height/2 };
                        let oppCenter = { x: opponent.x + opponent.width/2, y: opponent.y + opponent.height/2 };
                        let angle = Math.atan2(oppCenter.y - myCenter.y, oppCenter.x - myCenter.x);
                        
                        let proj = new DirectedProjectile(
                            myCenter.x, myCenter.y,
                            Math.cos(angle) * 15, Math.sin(angle) * 15,
                            this.color, this, attackDamage, 20, 10
                        );
                        projectiles.push(proj);
                    } else if (this.skillType === 'roastedCheese') {
                        let proj = new CheeseProjectile(
                            this.facingRight ? this.x + this.width : this.x - 20, 
                            this.y + 15, 
                            this.facingRight ? 12 : -12, 
                            this
                        );
                        projectiles.push(proj);
                    } else if (this.skillType === 'energy') {
                        let proj = new EnergyProjectile(
                            this.facingRight ? this.x + this.width : this.x - 20, 
                            this.y + 15, 
                            this.facingRight ? 12 : -12, 
                            '#00ffff', this, attackDamage, 20, 10
                        );
                        projectiles.push(proj);
                    } else if (this.skillType === 'blackFlash') {
                        let proj = new MeleePunchHitbox(
                            this.facingRight ? this.x + this.width : this.x - 40,
                            this.y,
                            this.facingRight,
                            this
                        );
                        proj.damage = attackDamage;
                        projectiles.push(proj);
                    } else {
                        let bulletColor = (this.skillType === 'bulletsBuff') ? '#ffdd00' : (isPoison ? '#8a2be2' : this.color);
                        let proj = new Projectile(
                            this.facingRight ? this.x + this.width : this.x - 20, 
                            this.y + 15, 
                            this.facingRight ? 12 : -12, 
                            bulletColor, this, attackDamage, 20, 10
                        );
                        if (isPoison) proj.isPoison = true; 
                        projectiles.push(proj);
                    }
                    this.attackCooldown = 35;
                }

                if (keys[this.controls.skill] && this.skillCooldown <= 0 && canSkill && this.skillType !== 'energy' && this.skillType !== 'wings') {
                    let cTime = this.getChannelTime(this.skillType);
                    if (cTime > 0) {
                        this.isChanneling = true;
                        this.channelMax = cTime;
                        this.channelTimer = cTime;
                    } else {
                        this.useSkill();
                    }
                }
                
                if (keys[this.controls.baseDash] && this.baseDashCooldown <= 0 && canDash && this.bubbledTimer <= 0 && this.magnetPullTimer <= 0) {
                    this.isBaseDashing = true;
                    this.baseDashTimer = 8;
                    this.vx = this.facingRight ? 20 : -20;
                    this.baseDashCooldown = (this.skillType === 'stiffLegs') ? 15 : 120; // 15 frames = 0.25s
                    this.triggerCombo();
                }
            }
            
            if (this.isDashing) {
                this.dashTimer--;
                this.vy = 0; 
                if (this.dashTimer <= 0) {
                    this.isDashing = false;
                    this.hasHitWithDash = false;
                }
            } 
            else if (this.isBaseDashing) {
                this.baseDashTimer--;
                this.vy = 0;
                if (this.baseDashTimer <= 0) {
                    this.isBaseDashing = false;
                }
            } 
            else {
                if (this.bubbledTimer > 0) {
                    if (this.y > 0) this.vy = -1.5; 
                    else this.vy = 0; 
                } 
                else if (this.magnetPullTimer > 0 && this.magnetSource) {
                    let dx = this.magnetSource.x + this.magnetSource.width/2 - (this.x + this.width/2);
                    let dy = this.magnetSource.y + this.magnetSource.height/2 - (this.y + this.height/2);
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > 30) {
                        this.vy = (dy / dist) * 40; 
                    } else {
                        this.vy = 0;
                    }
                }
                else if (this.fireSoulTimer > 0 || this.isFlying) {
                    this.vy = 0;
                    if (keys[this.controls.up]) this.vy = -this.speed * currentSpeedMult;
                    else if (keys[this.controls.down]) this.vy = this.speed * currentSpeedMult;
                } else if (!(this.isChanneling && (this.skillType === 'sound' || this.skillType === 'kamehameha')) && !this.isKamehamehaing) {
                this.vy += gravity * currentGravityMult; 
                }
            }

            this.x += this.vx;
            this.y += this.vy;

            if (this.chainedTimer > 0 && this.chainCenter) {
                this.chainedTimer--;
                let dx = (this.x + this.width/2) - this.chainCenter.x;
                let dy = (this.y + this.height/2) - this.chainCenter.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 150) {
                    let angle = Math.atan2(dy, dx);
                    this.x = this.chainCenter.x + Math.cos(angle) * 150 - this.width/2;
                    this.y = this.chainCenter.y + Math.sin(angle) * 150 - this.height/2;
                }
            }

            this.onGround = false;
            
            if (this.y + this.height >= canvas.height - groundHeight) {
                this.y = canvas.height - groundHeight - this.height;
                if (this.fireSoulTimer <= 0 && !this.isFlying && this.bubbledTimer <= 0 && this.magnetPullTimer <= 0) this.vy = 0;
                this.onGround = true;
            }

            for (let plat of platforms) {
                if (this.vy > 0 && 
                    this.y + this.height - this.vy <= plat.y && 
                    this.x + this.width > plat.x && 
                    this.x < plat.x + plat.w && 
                    this.y + this.height >= plat.y) {
                    
                    this.y = plat.y - this.height;
                    if(this.bubbledTimer <= 0 && this.magnetPullTimer <= 0) this.vy = 0;
                    this.onGround = true;
                }
            }

            if (this.onGround) {
                this.jumpCount = 0;
                this.isFlying = false;
                
                if (this.skillType === 'wings') {
                    if (this.flightPoints < 10) {
                        this.groundRegenTick++;
                        if (this.groundRegenTick >= 120) {
                            this.flightPoints = Math.min(10, this.flightPoints + 3);
                            this.groundRegenTick = 0;
                        }
                    }
                }
            } else {
                this.groundRegenTick = 0;
            }

            let upPressed = keys[this.controls.up];
            if (upPressed && !this.prevUpKey && !this.isBlocking && !this.isDashing && !this.isBaseDashing && !this.isChanneling && this.cantJumpTimer <= 0 && this.fireSoulTimer <= 0 && this.bubbledTimer <= 0 && this.magnetPullTimer <= 0) {
                if (this.skillType === 'wings' && this.jumpCount >= 1 && this.flightPoints > 0 && !this.isFlying) {
                    this.isFlying = true;
                    this.vy = 0;
                } else if (this.jumpCount < this.maxJumps) {
                    this.vy = this.jumpPower * currentJumpMult; 
                    this.jumpCount++;
                    this.onGround = false;
                }
            }
            this.prevUpKey = upPressed;

            if (this.x < 0) this.x = 0;
            if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
        }

        useSkill() {
            let opponent = (this === player1) ? player2 : player1;

            if (this.skillType === 'fireball') {
                this.skillCooldown = 240; 
                projectiles.push(new Projectile(
                    this.facingRight ? this.x + this.width : this.x - 30, 
                    this.y + 5, 
                    this.facingRight ? 10 : -10, 
                    '#ff9900', this, 25, 40, 30 
                ));
            } 
            else if (this.skillType === 'lightningDash') {
                this.skillCooldown = 180;
                this.isDashing = true;
                this.dashTimer = 15;
                this.vx = this.facingRight ? 30 : -30;
            }
            else if (this.skillType === 'waterShield') {
                this.skillCooldown = 400;
                this.waterShieldTimer = 180; 
            }
            else if (this.skillType === 'earthSpike') {
                this.skillCooldown = 180;
                projectiles.push(new EarthSpikeProjectile(
                    opponent.x + opponent.width/2 - 30, 
                    canvas.height - groundHeight, 
                    this
                ));
            }
            else if (this.skillType === 'windBullets') {
                this.skillCooldown = 240;
                this.isDashing = true;
                this.dashTimer = 6; 
                this.vx = this.facingRight ? 20 : -20;
                projectiles.push(new WindProjectile(
                    this.facingRight ? this.x + this.width : this.x - 30, 
                    this.y + 10, 
                    this.facingRight ? 16 : -16, 
                    this
                ));
            }
            else if (this.skillType === 'snowRolling') {
                this.skillCooldown = 300;
                projectiles.push(new SnowballProjectile(
                    this.facingRight ? this.x + this.width + 5 : this.x - 20,
                    this.y + this.height - 15,
                    this.facingRight ? 6 : -6,
                    this
                ));
            }
            else if (this.skillType === 'bulletsBuff') {
                this.skillCooldown = 30; 
            }
            else if (this.skillType === 'diamondMeteorite') {
                this.skillCooldown = 400; 
                for(let i=0; i<10; i++) {
                    let randomX = Math.random() * (canvas.width - 40);
                    projectiles.push(new DiamondProjectile(randomX, -100 - (i*80), this));
                }
            }
            else if (this.skillType === 'poisonBullets') {
                this.skillCooldown = 30; 
            }
            else if (this.skillType === 'lightHole') {
                this.skillCooldown = 300; 
                projectiles.push(new LightBulletProjectile(
                    this.facingRight ? this.x + this.width : this.x - 20, 
                    this.y + 15, 
                    this.facingRight ? 15 : -15, 
                    this
                ));
            }
            else if (this.skillType === 'darkHole') {
                this.skillCooldown = 360; 
                projectiles.push(new DarkBulletProjectile(
                    this.facingRight ? this.x + this.width : this.x - 20, 
                    this.y + 15, 
                    this.facingRight ? 15 : -15, 
                    this
                ));
            }
            else if (this.skillType === 'weight') {
                this.skillCooldown = 300; 
                opponent.cantJumpTimer = 180;
                if (!opponent.onGround) {
                    opponent.takeDamage(10);
                    opponent.y = canvas.height - groundHeight - opponent.height;
                    opponent.vy = 0;
                    opponent.onGround = true;
                }
            }
            else if (this.skillType === 'sound') {
                this.skillCooldown = 300; 
                let dx = opponent.x + opponent.width/2 - (this.x + this.width/2);
                let dy = opponent.y + opponent.height/2 - (this.y + this.height/2);
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 450) {
                    let dmg = Math.max(0, 45 * (1 - dist/450));
                    opponent.takeDamage(dmg);
                }
                projectiles.push(new SoundVisual(this.x + this.width/2, this.y + this.height/2));
            }
            else if (this.skillType === 'time') {
                this.skillCooldown = 300; 
                opponent.frozenTimer = 150;
                projectiles.forEach(p => {
                    if (p.owner === opponent) p.frozenTimer = 150;
                });
                minions.forEach(m => {
                    if (m.owner === opponent) m.frozenTimer = 150;
                });
                plants.forEach(pl => {
                    if (pl.owner === opponent) pl.frozenTimer = 150;
                });
                this.hp = Math.min(this.maxHp, this.hp + 15);
            }
            else if (this.skillType === 'space') {
                this.skillCooldown = 480; 
                let tx = this.x, ty = this.y;
                this.x = opponent.x; this.y = opponent.y;
                opponent.x = tx; opponent.y = ty;
                this.spaceBuffCount = 3;
            }
            else if (this.skillType === 'plasmaExplosion') {
                this.skillCooldown = 600; 
                this.plasmaMark = { x: opponent.x + opponent.width/2, y: opponent.y + opponent.height/2 };
                this.plasmaChargeTimer = 135; 
            }
            else if (this.skillType === 'chaosEnchain') {
                this.skillCooldown = 420; 
                projectiles.push(new ChaosOrbProjectile(
                    this.facingRight ? this.x + this.width : this.x - 25, 
                    this.y + 10, 
                    this.facingRight ? 12 : -12, 
                    this
                ));
            }
            else if (this.skillType === 'fireSoul') {
                this.skillCooldown = 600; 
                this.fireSoulTimer = 180; 
            }
            else if (this.skillType === 'scratchingBlood') {
                this.skillCooldown = 480; 
                projectiles.push(new BloodSlash(
                    this.facingRight ? this.x + this.width : this.x - 250, 
                    this.y - 25, 
                    this.facingRight, 
                    this
                ));
            }
            

            else if (this.skillType === 'swordEnergy') {
                this.skillCooldown = 420; 
                this.isDashing = true;
                this.dashTimer = 16; 
                this.vx = this.facingRight ? 20 : -20;
                
                projectiles.push(new SwordWaveProjectile(
                    this.facingRight ? this.x + this.width : this.x - 60,
                    this.y - 35,
                    this.facingRight,
                    this
                ));
            }
            else if (this.skillType === 'magicOrb') {
                if (this.activeOrb && this.activeOrb.active && !this.activeOrb.isExploding) {
                    this.activeOrb.detonate();
                    this.activeOrb = null;
                    this.skillCooldown = 360; 
                } else {
                    this.activeOrb = new MagicOrbProjectile(
                        this.facingRight ? this.x + this.width : this.x - 20, 
                        this.y + 15, 
                        this.facingRight ? 12 : -12, 
                        this
                    );
                    projectiles.push(this.activeOrb);
                    this.skillCooldown = 15; 
                }
            }
            else if (this.skillType === 'bananaApprentice') {
                this.skillCooldown = 480; 
                minions.push(new BananaMinion(
                    this.facingRight ? this.x + this.width + 10 : this.x - 30, 
                    this.y - 10, 
                    this, 
                    this.facingRight
                ));
            }
            else if (this.skillType === 'bubbleBall') {
                this.skillCooldown = 300; 
                projectiles.push(new BubbleProjectile(
                    this.facingRight ? this.x + this.width : this.x - 30, 
                    this.y + 5, 
                    this.facingRight ? 10 : -10, 
                    this
                ));
            }
            else if (this.skillType === 'spit') {
                this.skillCooldown = 420; 
                this.spitCount = 3; 
            }
            else if (this.skillType === 'magneticAttraction') {
                this.skillCooldown = 480; 
                opponent.magnetizedTimer = 150; 
                opponent.magnetPullTimer = 15;  
                opponent.magnetSource = this;
            }
            else if (this.skillType === 'plantingTrees') {
                this.skillCooldown = 480; //480
                let types = ['sunflower', 'peashooter', 'wallnut'];
                let chosenType = types[Math.floor(Math.random() * types.length)];
                plants.push(new Plant(this.x, this.y, this, chosenType, this.facingRight));
            } 
            else if (this.skillType === 'chickenBodybuilder') {
                this.skillCooldown = 540; // Cooldown 9 giây
                minions.push(new ChickenMinion(
                    this.facingRight ? this.x + this.width + 10 : this.x - 50, 
                    this.y - 60, 
                    this, 
                    this.facingRight
                ));
            }
            else if (this.skillType === 'hollowPurple') {
                this.skillCooldown = 720; // Hồi chiêu 12 giây
                projectiles.push(new HollowPurpleProjectile(
                    this.facingRight ? this.x + this.width : this.x - 300, 
                    this.y + this.height/2 - 150, // Căn giữa hitbox
                    this.facingRight ? 20 : -20, // Tốc độ bay
                    this
                ));
            } else if (this.skillType === 'haiPhongCity') {
                this.skillCooldown = 420; // Hồi chiêu 7 giây
                // Gọi bộ xả đạn
                projectiles.push(new HaiPhongCitySpawner(this.x, this.y, this));
            } else if (this.skillType === 'boomerangSaw') {
                this.skillCooldown = 600; // Hồi chiêu 10 giây (60*10)
                projectiles.push(new BoomerangSawProjectile(this));
            } else if (this.skillType === 'trample') {
                this.skillCooldown = 360; // Hồi chiêu 6 giây
                let opponent = (this === player1) ? player2 : player1;
                // Lấy vị trí x của địch ngay lúc vận chiêu xong
                let footW = 120; // Chiều rộng bàn chân
                let targetX = opponent.x + opponent.width/2 - footW/2;
                projectiles.push(new TrampleFoot(targetX, this));
            } else if (this.skillType === 'dragonBreath') {
                this.skillCooldown = 720; // Hồi chiêu 12 giây
                projectiles.push(new EnderDragonSkill(this));
            } else if (this.skillType === 'kamehameha') {
                this.skillCooldown = 720; // Hồi chiêu 12s
                this.isKamehamehaing = true;
                projectiles.push(new KamehamehaBeam(this));
            } else if (this.skillType === 'blackFlash') {
                this.skillCooldown = 300; // Hồi chiêu 5 giây
                this.isDashing = true; 
                this.isBlackFlashing = true; 
                this.dashTimer = 15; // Thời gian lướt dài = 2 lướt
                this.vx = this.facingRight ? 25 : -25; // Tốc độ siêu nhanh
                
                // Ném hitbox đuổi theo người chơi
                projectiles.push(new BlackFlashDashHitbox(this));
            }
            
            this.triggerCombo();
        }

        draw() {
            if (this.chainedTimer > 0 && this.chainCenter) {
                ctx.strokeStyle = 'rgba(255, 0, 127, 0.6)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(this.chainCenter.x, this.chainCenter.y, 150, 0, Math.PI*2);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(this.chainCenter.x, this.chainCenter.y);
                ctx.lineTo(this.x + this.width/2, this.y + this.height/2);
                ctx.stroke();
            }

            if (this.waterShieldTimer > 0) {
                ctx.fillStyle = 'rgba(0, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x + this.width/2, this.y + this.height/2, 35, 0, Math.PI * 2);
                ctx.fill();
            }

            if (this.bubbledTimer > 0) {
                ctx.fillStyle = 'rgba(173, 216, 230, 0.4)';
                ctx.strokeStyle = 'rgba(173, 216, 230, 0.9)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x + this.width/2, this.y + this.height/2, 35, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }

            if (this.fireSoulTimer > 0) {
                ctx.fillStyle = (Math.floor(Date.now() / 100) % 2 === 0) ? '#ff4500' : '#ffa500';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff4500';
            } else if (this.frozenTimer > 0) {
                ctx.fillStyle = '#0055aa';
            } else {
                ctx.fillStyle = this.color;
            }
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.shadowBlur = 0; 
            
            ctx.fillStyle = 'white';
            let eyeX = this.facingRight ? this.x + 8 : this.x + 2;
            ctx.fillRect(eyeX, this.y + 6, 6, 6);

            if (this.magnetizedTimer > 0) {
                ctx.strokeStyle = (Math.floor(Date.now() / 100) % 2 === 0) ? 'rgba(200, 0, 255, 0.9)' : 'rgba(100, 0, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x + this.width/2, this.y + this.height/2, 25, 0, Math.PI * 2);
                ctx.stroke();
            }

            if (this.skillType === 'wings') {
                ctx.fillStyle = '#00ffff';
                ctx.font = '12px Courier New';
                ctx.fillText(`FP: ${this.flightPoints}`, this.x - 10, this.y - 10);
            }

            if (this.isBlocking) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.lineWidth = 3;
                ctx.strokeRect(this.x - 4, this.y - 4, this.width + 8, this.height + 8);
            }

            if (this.isDashing || this.isBaseDashing) {
                ctx.fillStyle = this.isDashing ? 'rgba(255, 255, 0, 0.5)' : 'rgba(255, 255, 255, 0.4)';
                if (this.skillType === 'windBullets' && this.isDashing) ctx.fillStyle = 'rgba(150, 255, 150, 0.5)';
                if (this.isBlackFlashing) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    // Vẽ bóng thứ 2 tạo cảm giác Double Dash
                    ctx.fillRect(this.x - this.vx * 1.5, this.y, this.width, this.height);
                }
                ctx.fillRect(this.x - this.vx, this.y, this.width, this.height);
            }

            if (this.isChanneling) {
                let barW = 30; let barH = 5;
                let barX = this.x + (this.width / 2) - (barW / 2); let barY = this.y - 12;
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(barX, barY, barW, barH);
                let progress = 1 - (this.channelTimer / this.channelMax);
                ctx.fillStyle = '#00bfff';
                ctx.fillRect(barX, barY, barW * progress, barH);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
                ctx.strokeRect(barX, barY, barW, barH);
            }
            // Hiệu ứng vận chiêu Hư Thức Tử
            // Hiệu ứng vận chiêu Hư Thức Tử
            if (this.isChanneling && this.skillType === 'hollowPurple') {
                let progress = 1 - (this.channelTimer / this.channelMax); // Từ 0 đến 1
                let dir = this.facingRight ? -1 : 1; 
                let mergeX = this.x + this.width/2 + (dir * 60); // Vị trí tụ chưởng sau lưng
                let mergeY = this.y - 10;
                let distance = 60 * (1 - progress); // 2 quả cầu bay dần vào nhau
                
                // 1. HIỆU ỨNG HÚT MÀN HÌNH VÀ MAP TÍM LẠI
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset góc nhìn ra toàn màn hình
                
                // Phủ map màu tím dần dần
                ctx.fillStyle = `rgba(75, 0, 130, ${progress * 0.4})`; // Tím trong suốt
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 2. VẼ ẢNH GOJO CARTON CUT-IN Ở GÓC (Khung tam giác)
                let cornerX = this === player1 ? 20 : canvas.width - 220; // Player 1 góc trái, 2 góc phải
                let cornerY = 20;
                
                ctx.translate(cornerX, cornerY);
                if (progress > 0.05) { // Bắt đầu hiện ra
                    // Vẽ khung tam giác
                    ctx.beginPath();
                    ctx.moveTo(100, 0);
                    ctx.lineTo(200, 150);
                    ctx.lineTo(0, 150);
                    ctx.closePath();
                    
                    // Nền khung tam giác
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                    ctx.fill();
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#fff';
                    ctx.stroke();
                    
                    // Cắt xén (clip) để các nét vẽ Gojo không bị tràn ra ngoài tam giác
                    ctx.clip();

                    // --- Vẽ Gojo Carton ---
                    // Cổ & Mặt
                    ctx.fillStyle = '#ffccaa';
                    ctx.fillRect(90, 75, 20, 20); // Cổ
                    ctx.beginPath(); ctx.arc(100, 65, 22, 0, Math.PI); ctx.fill(); // Cằm
                    
                    // Áo đen
                    ctx.fillStyle = '#222';
                    ctx.beginPath(); ctx.moveTo(70, 150); ctx.lineTo(100, 90); ctx.lineTo(130, 150); ctx.fill();

                    // Băng bịt mắt
                    ctx.fillStyle = '#111';
                    ctx.fillRect(72, 45, 56, 18);
                    
                    // Tóc trắng vuốt dựng
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(100, 48, 28, 0, Math.PI*2); ctx.fill(); // Phồng tóc
                    ctx.beginPath(); ctx.moveTo(60, 50); ctx.lineTo(90, 5); ctx.lineTo(110, 5); ctx.lineTo(140, 50); ctx.fill(); // Gai tóc
                    
                    // 2 tay chắp lại (ấn chú)
                    ctx.fillStyle = '#ffccaa';
                    ctx.beginPath(); ctx.arc(94, 115, 8, 0, Math.PI*2); ctx.fill(); // Tay trái
                    ctx.beginPath(); ctx.arc(106, 115, 8, 0, Math.PI*2); ctx.fill(); // Tay phải
                    
                    // Cầu sáng tím lóe lên trên tay Gojo
                    let miniPurpleSize = 4 + Math.random() * 4;
                    ctx.fillStyle = '#8a2be2';
                    ctx.shadowBlur = 15; ctx.shadowColor = '#8a2be2';
                    ctx.beginPath(); ctx.arc(100, 105, miniPurpleSize, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                }
                ctx.restore(); // Kết thúc vẽ UI không gian

                // 3. VẼ HAI QUẢ CẦU ĐỎ XANH HỢP NHẤT Ở SAU LƯNG TƯỚNG (Giữ lại logic cũ)
                ctx.fillStyle = 'rgba(255, 0, 0, 0.9)';
                ctx.shadowBlur = 15; ctx.shadowColor = 'red';
                ctx.beginPath(); ctx.arc(mergeX, mergeY - distance, 15, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = 'rgba(0, 0, 255, 0.9)';
                ctx.shadowBlur = 15; ctx.shadowColor = 'blue';
                ctx.beginPath(); ctx.arc(mergeX, mergeY + distance, 15, 0, Math.PI*2); ctx.fill();
                
                ctx.shadowBlur = 0; 
                
                // Cầu tím khổng lồ bùng nổ khi sắp vận xong
                if (progress > 0.8) {
                    let purpleRadius = 20 + ((progress - 0.8) * 80);
                    ctx.fillStyle = `rgba(138, 43, 226, ${(progress - 0.8) * 5})`;
                    ctx.beginPath(); ctx.arc(mergeX, mergeY, purpleRadius, 0, Math.PI*2); ctx.fill();
                }
            }
            if (this.spaceBuffCount > 0) {
                ctx.fillStyle = '#ff00ff';
                for(let i=0; i<this.spaceBuffCount; i++) {
                    ctx.fillRect(this.x + i*6 - 2, this.y - 10, 4, 4);
                }
            }

            if (this.plasmaChargeTimer > 0) {
                let size = ((135 - this.plasmaChargeTimer) / 135) * 35; 
                ctx.fillStyle = `rgba(255, 50, 255, 0.8)`;
                ctx.beginPath();
                ctx.arc(this.x + this.width/2, this.y - 40, size, 0, Math.PI*2);
                ctx.fill();

                if (this.plasmaMark) {
                    ctx.strokeStyle = 'rgba(255, 0, 0, 0.8)'; 
                    ctx.lineWidth = 2;
                    ctx.beginPath(); 
                    ctx.arc(this.plasmaMark.x, this.plasmaMark.y, 20, 0, Math.PI*2); 
                    ctx.stroke();
                    ctx.beginPath(); 
                    ctx.moveTo(this.plasmaMark.x - 25, this.plasmaMark.y);
                    ctx.lineTo(this.plasmaMark.x + 25, this.plasmaMark.y);
                    ctx.moveTo(this.plasmaMark.x, this.plasmaMark.y - 25);
                    ctx.lineTo(this.plasmaMark.x, this.plasmaMark.y + 25);
                    ctx.stroke();
                }
            }
        }

        takeDamage(amount) {
            if (this.fireSoulTimer > 0) return; 
            if (this.waterShieldTimer > 0) return;
            
            // Giảm 75% sát thương khi đang vận hoặc bắn Kamehameha
            if (this.isKamehamehaing || (this.isChanneling && this.skillType === 'kamehameha')) {
                amount *= 0.25; 
            } else if (this.isBlocking) {
                amount *= 0.2;
            }
            
            this.hp -= amount;
            if (this.hp <= 0) {
                this.hp = 0;
                this.isDead = true;
            }
        }
    }

    // --- CÁC CLASS CÂY (PLANTING TREES) ---

    class Plant {
        constructor(x, y, owner, type, facingRight) {
            this.x = x; this.y = y;
            this.owner = owner;
            this.type = type;
            this.facingRight = facingRight;
            this.active = true;
            this.isDead = false;
            this.vy = 0;
            
            this.width = 16; 
            this.height = 32;

            if (type === 'sunflower') {
                this.maxHp = 30; this.hp = 30;
                this.lifeTimer = 0;
            } else if (type === 'peashooter') {
                this.maxHp = 15; this.hp = 15;
                this.attackCooldown = 0;
            } else if (type === 'wallnut') {
                this.maxHp = 200; this.hp = 200;
                this.width = 24; 
                this.height = 30;
                this.y -= 2; 
            }
        }

        update() {
            if (!this.active) return;
            if (this.frozenTimer && this.frozenTimer > 0) { this.frozenTimer--; return; }
            if (this.hp <= 0 && !this.isDead) {
                this.hp = 0;
                this.isDead = true;
                this.active = false;
                return;
            }

            this.vy += gravity;
            this.y += this.vy;

            let onGround = false;
            if (this.y + this.height >= canvas.height - groundHeight) {
                this.y = canvas.height - groundHeight - this.height;
                this.vy = 0;
                onGround = true;
            }
            for (let plat of platforms) {
                if (this.vy > 0 && this.y + this.height - this.vy <= plat.y && this.x + this.width > plat.x && this.x < plat.x + plat.w && this.y + this.height >= plat.y) {
                    this.y = plat.y - this.height;
                    this.vy = 0;
                    onGround = true;
                }
            }

            if (this.type === 'sunflower') {
                this.lifeTimer++;
                if (this.lifeTimer > 420) { 
                    if (this.lifeTimer % 60 === 0) { 
                        if (Math.random() < 0.1) { 
                            suns.push(new SunProjectile(this.x + this.width/2 - 7.5, this.y - 15, this.owner));
                        }
                    }
                }
            } else if (this.type === 'peashooter') {
                if (this.attackCooldown > 0) this.attackCooldown--;
                else {
                    let enemyPlayer = (this.owner === player1) ? player2 : player1;
                    let target = enemyPlayer;
                    let minDist = 9999;
                    
                    for (let m of minions) {
                        if (m.owner !== this.owner && m.active && !m.isDead) {
                            let dist = Math.hypot(m.x - this.x, m.y - this.y);
                            if (dist < minDist) {
                                minDist = dist;
                                target = m;
                            }
                        }
                    }
                    
                    let dx = target.x + target.width/2 - (this.x + this.width/2);
                    let dy = target.y + target.height/2 - (this.y + 5);
                    this.facingRight = dx > 0;
                    
                    let angle = Math.atan2(dy, dx);
                    
                    projectiles.push(new DirectedProjectile(
                        this.x + this.width/2, this.y + 5, 
                        Math.cos(angle) * 12, Math.sin(angle) * 12, 
                        '#32cd32', this.owner, 4, 10, 10
                    ));
                    this.attackCooldown = 35;
                }
            }
        }

        draw() {
            if (!this.active) return;
            ctx.save();
            ctx.translate(this.x + this.width/2, this.y + this.height);
            
            if (this.type === 'sunflower') {
                let isGlowing = (this.lifeTimer > 420);
                if (isGlowing) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#FFD700';
                }
                
                ctx.fillStyle = '#228B22'; 
                ctx.fillRect(-4, -30, 8, 30);
                
                ctx.fillStyle = '#90EE90'; 
                ctx.beginPath(); ctx.ellipse(-10, -15, 7, 3, Math.PI/6, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(10, -15, 7, 3, -Math.PI/6, 0, Math.PI*2); ctx.fill();
                
                ctx.translate(0, -30);
                ctx.fillStyle = '#FFD700'; 
                for(let i=0; i<8; i++) {
                    ctx.beginPath();
                    ctx.arc(Math.cos(i*Math.PI/4)*12, Math.sin(i*Math.PI/4)*12, 6, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = '#8B4513';
                ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                
            } else if (this.type === 'peashooter') {
                ctx.fillStyle = '#228B22';
                ctx.fillRect(-3, -25, 6, 25);
                
                ctx.fillStyle = '#90EE90';
                ctx.beginPath(); ctx.ellipse(-8, -10, 6, 3, Math.PI/4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(8, -10, 6, 3, -Math.PI/4, 0, Math.PI*2); ctx.fill();
                
                ctx.translate(0, -25);
                ctx.fillStyle = '#90EE90';
                ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
                
                let mouthX = this.facingRight ? 12 : -12;
                ctx.beginPath(); ctx.arc(mouthX, 0, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#006400'; 
                ctx.beginPath(); ctx.arc(mouthX + (this.facingRight?2:-2), 0, 4, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = 'black';
                let eyeX = this.facingRight ? 3 : -3;
                ctx.beginPath(); ctx.arc(eyeX, -4, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(eyeX + (this.facingRight?4:-4), -4, 2, 0, Math.PI*2); ctx.fill();
                
            } else if (this.type === 'wallnut') {
                ctx.fillStyle = '#CD853F'; 
                
                ctx.beginPath(); ctx.ellipse(0, -15, 12, 16, 0, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#A0522D';
                ctx.lineWidth = 1;
                ctx.stroke();
                
                ctx.beginPath(); ctx.moveTo(-3, -25); ctx.lineTo(-1, -18); ctx.lineTo(-4, -12); ctx.stroke();
                
                ctx.fillStyle = 'black';
                let eyeX = this.facingRight ? 2 : -2;
                ctx.beginPath(); ctx.arc(eyeX - 3, -13, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(eyeX + 3, -13, 2, 0, Math.PI*2); ctx.fill();
                
                ctx.beginPath(); ctx.arc(eyeX, -8, 2, 0.2, Math.PI - 0.2); ctx.stroke();
            }
            
            ctx.restore();

            ctx.fillStyle = 'black';
            ctx.fillRect(this.x, this.y - 10, this.width, 4);
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(this.x, this.y - 10, this.width * (this.hp / this.maxHp), 4);
        }

        takeDamage(amount) {
            this.hp -= amount;
        }
    }

    class SunProjectile {
        constructor(x, y, targetPlayer) {
            this.x = x; this.y = y;
            this.targetPlayer = targetPlayer;
            this.width = 15; this.height = 15;
            this.active = true;
            this.speed = 1;
        }
        update() {
            let dx = this.targetPlayer.x + this.targetPlayer.width/2 - (this.x + this.width/2);
            let dy = this.targetPlayer.y + this.targetPlayer.height/2 - (this.y + this.height/2);
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 15) {
                this.targetPlayer.hp = Math.min(this.targetPlayer.maxHp, this.targetPlayer.hp + 15);
                this.active = false;
            } else {
                this.x += (dx/dist) * this.speed;
                this.y += (dy/dist) * this.speed;
            }
        }
        draw() {
            if (!this.active) return;
            ctx.fillStyle = '#FFD700';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#FFA500';
            ctx.beginPath();
            ctx.arc(this.x + this.width/2, this.y + this.height/2, this.width/2, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    // --- CÁC CLASS PROJECTILE ---

    class Projectile {
        constructor(x, y, vx, color, owner, damage, width, height) {
            this.x = x; this.y = y;
            this.vx = vx;
            this.width = width; this.height = height;
            this.color = color;
            this.owner = owner;
            this.damage = damage;
            this.active = true;
            this.isPoison = false; 
            this.frozenTimer = 0; 
        }
        update() {
            if (this.frozenTimer > 0) { this.frozenTimer--; return; }
            this.x += this.vx;
            if (this.x < 0 || this.x > canvas.width) this.active = false;
        }
        draw() {
            if (!this.active) return;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
        applyEffect(target) {
            target.takeDamage(this.damage);
            if (this.isPoison && target instanceof Player) {
                target.poisonTimer = 300;
            }
            if (this.owner.skillType === 'scratchingBlood' && this.damage > 0 && target instanceof Player) {
                this.owner.hp = Math.min(this.owner.maxHp, this.owner.hp + 1); 
            }
            this.active = false;
        }
    }

    class BubbleProjectile extends Projectile {
        constructor(x, y, vx, owner) {
            super(x, y, vx, 'rgba(173, 216, 230, 0.8)', owner, 0, 25, 25);
        }
        applyEffect(target) {
            if (target instanceof Player) {
                target.bubbledTimer = 150; 
            }
            this.active = false;
        }
        draw() {
            if (!this.active) return;
            ctx.fillStyle = 'rgba(173, 216, 230, 0.5)';
            ctx.strokeStyle = '#add8e6';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(this.x + this.width/2, this.y + this.height/2, this.width/2, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();
        }
    }

    class WindProjectile extends Projectile {
        constructor(x, y, vx, owner) {
            super(x, y, vx, 'rgba(150, 255, 150, 0.8)', owner, 19, 30, 20);
        }
        applyEffect(target) {
            target.takeDamage(this.damage);
            if (this.vx > 0) target.x = canvas.width - target.width;
            else target.x = 0;
            this.active = false;
        }
        draw() {
            if (!this.active) return;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.ellipse(this.x + this.width/2, this.y + this.height/2, this.width/2, this.height/2, 0, 0, Math.PI*2);
            ctx.fill();
        }
    }

    class SnowballProjectile extends Projectile {
        constructor(x, y, vx, owner) {
            super(x, y, vx, '#ffffff', owner, 0, 15, 15);
            this.maxDamage = 50;
            this.maxSize = 70;
            this.growRate = 0.3; 
        }
        update() {
            if (this.frozenTimer > 0) { this.frozenTimer--; return; }
            this.x += this.vx;
            if (this.y + this.height < canvas.height - groundHeight) {
                this.y += gravity * 4;
            } else {
                this.y = canvas.height - groundHeight - this.height;
            }
            if (this.width < this.maxSize) {
                this.width += this.growRate;
                this.height += this.growRate;
                this.y -= this.growRate; 
                this.damage = Math.min(this.maxDamage, this.damage + this.growRate * 0.4);
            }
            if (this.x < -100 || this.x > canvas.width + 100) this.active = false;
        }
        draw() {
            if (!this.active) return;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x + this.width/2, this.y + this.height/2, this.width/2, 0, Math.PI*2);
            ctx.fill();
        }
    }

    class DiamondProjectile {
        constructor(x, y, owner) {
            this.x = x; this.y = y; 
            this.vy = 10; 
            this.width = 40; this.height = 50;
            this.owner = owner; 
            this.damage = 50;
            this.active = true;
            this.frozenTimer = 0;
        }
        update() {
            if (this.frozenTimer > 0) { this.frozenTimer--; return; }
            this.y += this.vy;
            if (this.y + this.height >= canvas.height - groundHeight) {
                this.active = false; 
            }
        }
        draw() {
            if (!this.active) return;
            ctx.fillStyle = '#b9f2ff'; 
            ctx.beginPath();
            ctx.moveTo(this.x + this.width/2, this.y); 
            ctx.lineTo(this.x + this.width, this.y + this.height/3); 
            ctx.lineTo(this.x + this.width/2, this.y + this.height); 
            ctx.lineTo(this.x, this.y + this.height/3); 
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        applyEffect(target) {
            target.takeDamage(this.damage);
            this.active = false;
        }
    }

    class EarthSpikeProjectile {
        constructor(x, y, owner) {
            this.x = x; this.y = y;
            this.owner = owner;
            this.damage = 27;
            this.active = true;
            this.isWarning = true;
            this.warningTimer = 15;
            this.activeDuration = 15;
            this.width = 60; this.height = 90; 
            this.hasDealtDamage = false;
            this.frozenTimer = 0;
        }
        update() {
            if (this.frozenTimer > 0) { this.frozenTimer--; return; }
            if (this.isWarning) {
                this.warningTimer--;
                if (this.warningTimer <= 0) this.isWarning = false;
            } else {
                this.activeDuration--;
                if (this.activeDuration <= 0) this.active = false;
            }
        }
        draw() {
            if (!this.active) return;
            if (this.isWarning) {
                ctx.fillStyle = (this.warningTimer % 10 > 5) ? 'rgba(255, 0, 0, 0.6)' : 'rgba(255, 255, 0, 0.6)';
                ctx.fillRect(this.x, this.y - 10, this.width, 10);
            } else {
                ctx.fillStyle = '#8B4513';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.width / 2, this.y - this.height);
                ctx.lineTo(this.x + this.width, this.y);
                ctx.fill();
            }
        }
        applyEffect(target) {
            if (!this.hasDealtDamage) {
                target.takeDamage(this.damage);
                this.hasDealtDamage = true;
            }
        }
    }

    class LightBulletProjectile extends Projectile {
        constructor(x, y, vx, owner) {
            super(x, y, vx, '#ffff99', owner, 21, 15, 10);
        }
        applyEffect(target) {

    class BananaMinion {
        constructor(x, y, owner, facingRight) {
            this.x = x; this.y = y;
            this.width = 24; this.height = 40; 
            this.owner = owner;
            this.facingRight = facingRight;
            this.maxHp = 25;
            this.hp = 25;
            this.damage = 5;
            this.speed = 7; 
            this.vx = 0; this.vy = 0;
            this.active = true;
            this.isDead = false;
            this.deathTimer = 30; 
            
            this.attackWindup = 0;
            this.attackCooldown = 0;
            
            this.moveTick = 0;
        }

        update() {
            if (!this.active) return;
            if (this.frozenTimer && this.frozenTimer > 0) { this.frozenTimer--; return; }
            
            if (this.hp <= 0 && !this.isDead) {
                this.hp = 0;
                this.isDead = true;
            }

            if (this.isDead) {
                this.deathTimer--;
                if (this.deathTimer <= 0) this.active = false;
                return; 
            }

            let enemyPlayer = (this.owner === player1) ? player2 : player1;
            let target = enemyPlayer;
            let closestDist = Math.abs(enemyPlayer.x - this.x);

            // Kiểm tra Cây có trên đường đi không để ưu tiên
            for (let p of plants) {
                if (p.owner !== this.owner && p.active && !p.isDead) {
                    let dxToEnemy = enemyPlayer.x - this.x;
                    let dxToPlant = p.x - this.x;
                    
                    if (Math.sign(dxToEnemy) === Math.sign(dxToPlant) && Math.abs(dxToPlant) < closestDist) {
                        target = p;
                        closestDist = Math.abs(dxToPlant);
                    }
                }
            }
            
            this.vy += gravity;
            this.y += this.vy;

            let onGround = false;
            if (this.y + this.height >= canvas.height - groundHeight) {
                this.y = canvas.height - groundHeight - this.height;
                this.vy = 0;
                onGround = true;
            }
            for (let plat of platforms) {
                if (this.vy > 0 && 
                    this.y + this.height - this.vy <= plat.y && 
                    this.x + this.width > plat.x && 
                    this.x < plat.x + plat.w && 
                    this.y + this.height >= plat.y) {
                    this.y = plat.y - this.height;
                    this.vy = 0;
                    onGround = true;
                }
            }

            if (this.attackCooldown > 0) this.attackCooldown--;

            let dx = target.x + target.width/2 - (this.x + this.width/2);
            let dy = target.y + target.height/2 - (this.y + this.height/2);
            let dist = Math.sqrt(dx*dx + dy*dy);

            let attackRange = 40;
            
            if (this.attackWindup > 0) {
                this.attackWindup--;
                this.vx = 0; 
                if (this.attackWindup <= 0) {
                    if (dist <= attackRange + 20) { 
                        target.takeDamage(this.damage);
                    }
                    this.attackCooldown = 60; 
                }
            } else {
                if (Math.abs(dx) <= attackRange && Math.abs(dy) < 50) {
                    this.vx = 0;
                    if (this.attackCooldown <= 0) {
                        this.attackWindup = 15; 
                        this.facingRight = dx > 0;
                    }
                } else {
                    if (dx > 5) { this.vx = this.speed; this.facingRight = true; }
                    else if (dx < -5) { this.vx = -this.speed; this.facingRight = false; }
                    else { this.vx = 0; }
                }
            }

            this.x += this.vx;
            if (this.vx !== 0) this.moveTick++;
            else this.moveTick = 0;

            if (this.x < 0) this.x = 0;
            if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
        }

        draw() {
            if (!this.active) return;
            ctx.save();
            
            let centerX = this.x + this.width/2;
            let centerY = this.y + this.height/2;
            ctx.translate(centerX, centerY);
            
            if (this.vx !== 0 && !this.isDead) {
                let angle = Math.sin(this.moveTick * 0.3) * 0.2; 
                ctx.rotate(angle);
            }

            let bodyColor = this.isDead ? '#ff0000' : '#ffe135';
            let legColor = '#3e2723';
            let armColor = '#ffb300';

            ctx.fillStyle = legColor;
            let legOffset1 = 0; let legOffset2 = 0;
            if (this.vx !== 0 && !this.isDead) {
                legOffset1 = Math.sin(this.moveTick * 0.5) * 5;
                legOffset2 = -Math.sin(this.moveTick * 0.5) * 5;
            }
            ctx.beginPath(); ctx.arc(-6, this.height/2 + legOffset1, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(6, this.height/2 + legOffset2, 4, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = bodyColor;
            ctx.beginPath();
            if (this.facingRight) {
                ctx.moveTo(0, -this.height/2); 
                ctx.quadraticCurveTo(15, -10, 5, this.height/2); 
                ctx.lineTo(-5, this.height/2); 
                ctx.quadraticCurveTo(5, -10, -10, -this.height/2); 
            } else {
                ctx.moveTo(0, -this.height/2);
                ctx.quadraticCurveTo(-15, -10, -5, this.height/2); 
                ctx.lineTo(5, this.height/2); 
                ctx.quadraticCurveTo(-5, -10, 10, -this.height/2); 
            }
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#f57f17';
            ctx.lineWidth = 1;
            ctx.stroke();

            if (!this.isDead) {
                ctx.fillStyle = 'black';
                let eyeX = this.facingRight ? 2 : -6;
                ctx.beginPath(); ctx.arc(eyeX, -10, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(eyeX + 4, -10, 2, 0, Math.PI*2); ctx.fill();

                ctx.beginPath();
                ctx.arc(eyeX + 2, -4, 3, 0, Math.PI);
                ctx.stroke();

                ctx.fillStyle = armColor;
                if (this.attackWindup > 0) {
                    if (this.facingRight) ctx.fillRect(-10, 0, 8, 4);
                    else ctx.fillRect(2, 0, 8, 4);
                } else if (this.attackCooldown > 45) { 
                    if (this.facingRight) ctx.fillRect(5, 0, 15, 4);
                    else ctx.fillRect(-20, 0, 15, 4);
                } else {
                    ctx.fillRect(-12, 0, 6, 4);
                    ctx.fillRect(6, 0, 6, 4);
                }
            }

            ctx.restore();

            if (!this.isDead) {
                ctx.fillStyle = 'black';
                ctx.fillRect(this.x, this.y - 10, this.width, 4);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(this.x, this.y - 10, this.width * (this.hp / this.maxHp), 4);
            }
        }
        
        takeDamage(amount) {
            if (this.isDead) return;
            this.hp -= amount;
        }
    }

    class CheeseProjectile extends Projectile {
        constructor(x, y, vx, owner) {
            super(x, y, vx, '#fceea7', owner, 6, 30, 30); 
            this.angle = 0;
            this.rotationSpeed = vx > 0 ? 0.25 : -0.25;
        }
        update() {
            if (this.frozenTimer > 0) { this.frozenTimer--; return; }
            this.x += this.vx;
            this.angle += this.rotationSpeed;
            if (this.x < -100 || this.x > canvas.width + 100) this.active = false;
        }
        draw() {
            if (!this.active) return;
            ctx.save();
            ctx.translate(this.x + this.width/2, this.y + this.height/2);
            ctx.rotate(this.angle);

            ctx.fillStyle = '#ffcc00'; 
            ctx.strokeStyle = '#d68a00'; 
            ctx.lineWidth = 2;
            ctx.lineJoin = 'round';
